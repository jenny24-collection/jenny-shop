<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenny24 Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #FAF7F2;
    --dark: #1A1A1A;
    --gold: #C9A96E;
    --soft: #F0EBE3;
    --muted: #888;
  }

  body { background: var(--cream); color: var(--dark); font-family: 'Inter', sans-serif; min-height: 100vh; }

  header {
    background: var(--dark); padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .header-title { text-align: center; flex: 1; }
  .header-title h1 { font-family: 'Inter', sans-serif; font-weight: 700; color: var(--gold); font-size: 1.25rem; letter-spacing: 1px; }
  .header-title p { color: #aaa; font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }

  .btn-cart {
    position: relative; background: transparent; border: none;
    color: var(--gold); font-size: 1.5rem; cursor: pointer; padding: 4px;
  }

  .cart-badge {
    position: absolute; top: -4px; right: -4px;
    background: #E05050; color: white; font-size: 0.6rem;
    font-weight: 700; width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }

  .search-bar { padding: 12px 16px; background: var(--soft); }
  .search-bar input {
    width: 100%; padding: 10px 16px; border-radius: 24px;
    border: 1px solid #D0C9C0; background: white; font-size: 0.9rem;
    font-family: 'Inter', sans-serif; outline: none;
  }
  .search-bar input:focus { border-color: var(--gold); }

  .filter-bar {
    display: flex; gap: 8px; padding: 12px 16px;
    overflow-x: auto; background: var(--soft);
    border-bottom: 1px solid #E0D9D0;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    white-space: nowrap; padding: 6px 16px; border-radius: 20px;
    border: 1px solid #C5BBB0; background: transparent;
    font-size: 0.8rem; cursor: pointer; color: var(--dark);
    font-family: 'Inter', sans-serif; transition: all 0.2s; font-weight: 500;
  }
  .filter-btn.active, .filter-btn:hover { background: var(--dark); color: var(--gold); border-color: var(--dark); }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }

  .card {
    background: white; border-radius: 12px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative;
  }

  .card-num {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.55); color: white;
    font-size: 0.65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 10px; z-index: 1;
    letter-spacing: 0.5px;
  }

  .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--soft); display: block; }
  .card-no-img {
    width: 100%; aspect-ratio: 3/4;
    background: linear-gradient(135deg, #F0EBE3, #E5DDD4);
    display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
  }

  .card-info { padding: 8px 10px 10px; }
  .card-kategori { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); font-weight: 600; margin-bottom: 3px; }
  .card-nama { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.85rem; color: var(--dark); margin-bottom: 4px; line-height: 1.35; }
  .card-harga { font-size: 0.84rem; font-weight: 700; color: var(--dark); }
  .card-stok { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .card-stok.habis { color: #E05050; }

  .card-actions { display: flex; gap: 6px; padding: 0 10px 10px; }

  .btn-detail {
    flex: 1; padding: 7px; border-radius: 8px; border: 1px solid #E0D9D0;
    background: var(--soft); color: var(--dark); font-size: 0.75rem;
    cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500;
  }

  .btn-add-cart {
    flex: 1; padding: 7px; border-radius: 8px; border: none;
    background: var(--dark); color: var(--gold); font-size: 0.75rem;
    font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif;
  }

  .btn-add-cart:disabled { background: #ccc; color: #999; cursor: not-allowed; }

  /* LOADING */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }
  .loading-spinner {
    width: 32px; height: 32px; border: 3px solid var(--soft);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1/-1; }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }

  /* MODAL DETAIL */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end;
  }
  .overlay.show { display: flex; }

  .modal {
    background: white; border-radius: 20px 20px 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto;
    animation: slideUp 0.3s ease; position: relative;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

  .modal-handle-wrap { padding: 12px 24px 0; position: sticky; top: 0; background: white; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
  .modal-handle { width: 40px; height: 4px; background: #DDD; border-radius: 2px; margin: 0 auto; }
  .btn-close {
    background: var(--soft); border: none; width: 32px; height: 32px;
    border-radius: 50%; font-size: 1rem; cursor: pointer; flex-shrink: 0;
  }

  /* FOTO FULL — tidak di-crop */
  .modal-img-wrap {
    width: 100%;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    max-height: 70vw;
    overflow: hidden;
  }
  .modal-img-wrap img {
    width: 100%;
    max-height: 100vw;
    object-fit: contain;
    display: block;
  }
  .modal-no-img {
    width: 100%; aspect-ratio: 4/3;
    background: linear-gradient(135deg, #F0EBE3, #E5DDD4);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
  }

  .modal-body { padding: 16px 20px 24px; }
  .modal-badge { font-size: 0.65rem; background: var(--soft); color: var(--gold); padding: 3px 10px; border-radius: 10px; display: inline-block; margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .modal-nama { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 6px; line-height: 1.35; }
  .modal-harga { font-size: 1.25rem; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
  .modal-stok { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-bottom: 14px; }
  .stok-ada { background: #E8F5E9; color: #2E7D32; }
  .stok-habis { background: #FFEBEE; color: #C62828; }
  .modal-desk { font-size: 0.88rem; color: #555; line-height: 1.65; margin-bottom: 16px; }

  .modal-actions { display: flex; gap: 10px; }
  .btn-wa {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 13px; background: #25D366; color: white; border: none;
    border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .btn-cart-modal {
    flex: 1; padding: 13px; background: var(--dark); color: var(--gold);
    border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }

  /* KERANJANG */
  .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; align-items: flex-end; }
  .cart-overlay.show { display: flex; }

  .cart-panel {
    background: white; border-radius: 20px 20px 0 0;
    width: 100%; max-height: 88vh; overflow-y: auto;
    padding: 24px; animation: slideUp 0.3s ease;
  }

  .cart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .cart-header h2 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.1rem; }
  .cart-close { background: var(--soft); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; cursor: pointer; }

  .cart-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .cart-empty-icon { font-size: 3rem; margin-bottom: 10px; }

  .cart-item { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid #F0EBE3; }
  .cart-item-img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: var(--soft); flex-shrink: 0; }
  .cart-item-noimg { width: 56px; height: 56px; border-radius: 8px; background: var(--soft); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-nama { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cart-item-harga { font-size: 0.8rem; color: var(--gold); font-weight: 600; margin-top: 2px; }

  .cart-qty { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .btn-qty { width: 26px; height: 26px; border-radius: 50%; border: 1px solid #E0D9D0; background: var(--soft); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .qty-num { font-size: 0.9rem; font-weight: 600; min-width: 20px; text-align: center; }

  .btn-hapus-item { background: transparent; border: none; color: #E05050; font-size: 1.1rem; cursor: pointer; padding: 4px; }

  .cart-total { padding: 16px 0 8px; display: flex; justify-content: space-between; align-items: center; }
  .cart-total span { font-size: 0.9rem; color: var(--muted); }
  .cart-total strong { font-size: 1.1rem; font-weight: 700; }

  .btn-checkout {
    width: 100%; padding: 14px; background: #25D366; color: white;
    border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Inter', sans-serif;
  }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 10px 20px; border-radius: 24px; font-size: 0.82rem; z-index: 999; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
  .toast.show { opacity: 1; }

  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 0.75rem; border-top: 1px solid var(--soft); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div style="width:40px"></div>
  <div class="header-title">
    <h1>Jenny24 Collection</h1>
    <p>Fashion & Style</p>
  </div>
  <button class="btn-cart" onclick="bukaKeranjang()">
    🛒
    <span class="cart-badge" id="cartBadge">0</span>
  </button>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 Cari produk...">
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterKategori('semua', this)">Semua</button>
</div>

<div class="grid" id="produkGrid">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Memuat produk...</p>
  </div>
</div>

<!-- Modal Detail -->
<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-handle-wrap">
      <div style="width:32px"></div>
      <div class="modal-handle"></div>
      <button class="btn-close" onclick="tutupDetail()">✕</button>
    </div>
    <div id="detailIsi"></div>
  </div>
</div>

<!-- Keranjang -->
<div class="cart-overlay" id="cartOverlay">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>🛒 Keranjang</h2>
      <button class="cart-close" onclick="tutupKeranjang()">✕</button>
    </div>
    <div id="cartIsi"></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<footer>© 2024 Jenny24 Collection · Fashion & Style</footer>

<script>
const SUPABASE_URL = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYmtkaG11dGllcml5anFzaWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjA0MzIsImV4cCI6MjA5NzQ5NjQzMn0.EEBWrk2kI98owsQNlOOPGBmLzXHQGoUBJqsOyl7lTrc';
const BUCKET = 'produk_images';

var semuaProduk = [];
var kategoriAktif = 'semua';
var keranjang = [];
var produkDetail = null;

function fetchProduk() {
  fetch(SUPABASE_URL + '/rest/v1/produk?select=*&order=created_at.desc', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!Array.isArray(data)) { showGrid('<div class="empty"><div class="empty-icon">⚠️</div><p>' + (data.message||'Error') + '</p></div>'); return; }
    semuaProduk = data;
    renderKategori(data);
    renderProduk(data);
  })
  .catch(function(e) { showGrid('<div class="empty"><div class="empty-icon">⚠️</div><p>Gagal memuat: ' + e.message + '</p></div>'); });
}

function showGrid(html) { document.getElementById('produkGrid').innerHTML = html; }

function imgUrl(path) {
  if (!path) return null;
  if (path.indexOf('http') === 0) return path;
  return SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + path;
}

function fmtHarga(h) { return 'Rp ' + Number(h).toLocaleString('id-ID'); }

function renderKategori(data) {
  var kat = [];
  data.forEach(function(p) { if (p.kategori && kat.indexOf(p.kategori) === -1) kat.push(p.kategori); });
  var bar = document.getElementById('filterBar');
  bar.innerHTML = '<button class="filter-btn active" onclick="filterKategori(\'semua\', this)">Semua</button>';
  kat.forEach(function(k) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = k;
    btn.onclick = function() { filterKategori(k, this); };
    bar.appendChild(btn);
  });
}

function filterKategori(kat, el) {
  kategoriAktif = kat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');
  cariDanFilter();
}

function cariDanFilter() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var hasil = semuaProduk;
  if (kategoriAktif !== 'semua') hasil = hasil.filter(function(p) { return p.kategori === kategoriAktif; });
  if (q) hasil = hasil.filter(function(p) { return p.nama.toLowerCase().indexOf(q) !== -1 || (p.deskripsi||'').toLowerCase().indexOf(q) !== -1; });
  renderProduk(hasil);
}

function renderProduk(data) {
  if (!data.length) {
    showGrid('<div class="empty"><div class="empty-icon">👗</div><p>Tidak ada produk</p></div>');
    return;
  }
  var html = data.map(function(p, i) {
    var img = p.gambar_url
      ? '<img src="' + imgUrl(p.gambar_url) + '" alt="' + p.nama + '" onerror="this.style.display=\'none\'">'
      : '<div class="card-no-img">👗</div>';
    var habis = p.stok <= 0;
    return '<div class="card">' +
      '<div class="card-num">#' + String(i+1).padStart(3,'0') + '</div>' +
      img +
      '<div class="card-info">' +
        (p.kategori ? '<div class="card-kategori">' + p.kategori + '</div>' : '') +
        '<div class="card-nama">' + p.nama + '</div>' +
        '<div class="card-harga">' + fmtHarga(p.harga) + '</div>' +
        '<div class="card-stok' + (habis ? ' habis' : '') + '">' + (habis ? 'Habis' : 'Stok: ' + p.stok) + '</div>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="btn-detail" onclick="bukaDetail(\'' + p.id + '\')">Detail</button>' +
        '<button class="btn-add-cart"' + (habis ? ' disabled' : '') + ' onclick="tambahKeranjang(\'' + p.id + '\')">+ Keranjang</button>' +
      '</div>' +
    '</div>';
  }).join('');
  showGrid(html);
}

function bukaDetail(id) {
  var p = semuaProduk.find(function(x) { return x.id === id; });
  if (!p) return;
  produkDetail = p;
  var habis = p.stok <= 0;

  // Foto full (object-fit: contain, background hitam)
  var fotoHtml = p.gambar_url
    ? '<div class="modal-img-wrap"><img src="' + imgUrl(p.gambar_url) + '" alt="' + p.nama + '"></div>'
    : '<div class="modal-no-img">👗</div>';

  document.getElementById('detailIsi').innerHTML =
    fotoHtml +
    '<div class="modal-body">' +
      (p.kategori ? '<div class="modal-badge">' + p.kategori + '</div>' : '') +
      '<div class="modal-nama">' + p.nama + '</div>' +
      '<div class="modal-harga">' + fmtHarga(p.harga) + '</div>' +
      '<span class="modal-stok ' + (habis ? 'stok-habis' : 'stok-ada') + '">' + (habis ? '✗ Stok Habis' : '✓ Tersedia (' + p.stok + ' pcs)') + '</span>' +
      (p.deskripsi ? '<div class="modal-desk">' + p.deskripsi + '</div>' : '') +
      '<div class="modal-actions">' +
        (habis ? '' : '<button class="btn-cart-modal" onclick="tambahKeranjang(\'' + p.id + '\'); tutupDetail()">🛒 Keranjang</button>') +
        (habis ? '' : '<button class="btn-wa" onclick="pesanWA(\'' + p.nama + '\',' + p.harga + ')">💬 WhatsApp</button>') +
      '</div>' +
    '</div>';

  document.getElementById('detailOverlay').classList.add('show');
}

function tutupDetail() { document.getElementById('detailOverlay').classList.remove('show'); }

function tambahKeranjang(id) {
  var p = semuaProduk.find(function(x) { return x.id === id; });
  if (!p || p.stok <= 0) return;
  var ada = keranjang.find(function(x) { return x.id === id; });
  if (ada) {
    if (ada.qty < p.stok) { ada.qty++; toast('✅ ' + p.nama + ' +1'); }
    else { toast('⚠️ Stok tidak cukup'); return; }
  } else {
    var nomor = String(semuaProduk.indexOf(p) + 1).padStart(3,'0');
    keranjang.push({ id: p.id, num: nomor, nama: p.nama, harga: p.harga, gambar_url: p.gambar_url, qty: 1, stok: p.stok });
    toast('🛒 ' + p.nama + ' ditambahkan!');
  }
  updateBadge();
}

function updateBadge() {
  var total = keranjang.reduce(function(s, x) { return s + x.qty; }, 0);
  var badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function bukaKeranjang() {
  renderKeranjang();
  document.getElementById('cartOverlay').classList.add('show');
}

function tutupKeranjang() { document.getElementById('cartOverlay').classList.remove('show'); }

function renderKeranjang() {
  var el = document.getElementById('cartIsi');
  if (!keranjang.length) {
    el.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Keranjang masih kosong</p></div>';
    return;
  }
  var total = keranjang.reduce(function(s, x) { return s + x.harga * x.qty; }, 0);
  var items = keranjang.map(function(item, i) {
    var img = item.gambar_url
      ? '<img class="cart-item-img" src="' + imgUrl(item.gambar_url) + '" onerror="this.style.display=\'none\'">'
      : '<div class="cart-item-noimg">👗</div>';
    return '<div class="cart-item">' + img +
      '<div class="cart-item-info">' +
        '<div class="cart-item-nama">' + item.nama + '</div>' +
        '<div class="cart-item-harga">' + fmtHarga(item.harga) + '</div>' +
        '<div class="cart-qty">' +
          '<button class="btn-qty" onclick="ubahQty(' + i + ',-1)">−</button>' +
          '<span class="qty-num">' + item.qty + '</span>' +
          '<button class="btn-qty" onclick="ubahQty(' + i + ',1)">+</button>' +
        '</div>' +
      '</div>' +
      '<button class="btn-hapus-item" onclick="hapusItem(' + i + ')">🗑️</button>' +
    '</div>';
  }).join('');
  el.innerHTML = items +
    '<div class="cart-total"><span>Total (' + keranjang.reduce(function(s,x){return s+x.qty;},0) + ' item)</span><strong>' + fmtHarga(total) + '</strong></div>' +
    '<button class="btn-checkout" onclick="checkout()">💬 Checkout via WhatsApp</button>';
}

function ubahQty(i, delta) {
  keranjang[i].qty += delta;
  if (keranjang[i].qty <= 0) keranjang.splice(i, 1);
  else if (keranjang[i].qty > keranjang[i].stok) { keranjang[i].qty = keranjang[i].stok; toast('⚠️ Maks stok: ' + keranjang[i].stok); }
  updateBadge();
  renderKeranjang();
}

function hapusItem(i) { keranjang.splice(i, 1); updateBadge(); renderKeranjang(); }

function checkout() {
  if (!keranjang.length) return;
  var pesan = '🛍️ *Pesanan dari Jenny24 Collection*\n\n';
  keranjang.forEach(function(item, i) {
    pesan += (i+1) + '. [#' + item.num + '] ' + item.nama + ' x' + item.qty + ' = ' + fmtHarga(item.harga * item.qty) + '\n';
  });
  var total = keranjang.reduce(function(s,x) { return s + x.harga * x.qty; }, 0);
  pesan += '\n*Total: ' + fmtHarga(total) + '*\n\nMohon konfirmasi ketersediaan stok. Terima kasih! 🙏';
  window.open('https://wa.me/6283857074963?text=' + encodeURIComponent(pesan), '_blank');
}

function toast(msg) {
  var t = document.getElementById('toastEl');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

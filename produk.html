<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Produk · Jenny's Thrift Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAFA;--dark:#181818;--rose:#E63946;--blush:#F4D6D6;--ivory:#FFFFFF;--muted:#8A8A8A;--border:#E8E8E8}
body{background:var(--bg);color:var(--dark);font-family:'Inter',sans-serif;min-height:100vh}
header{background:var(--rose);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.bback{background:transparent;border:none;color:#FFFFFF;font-size:1.3rem;cursor:pointer;padding:4px 8px}
.htitle{flex:1;text-align:center}
.htitle h1{font-family:'Cormorant Garamond',serif;color:#FFFFFF;font-size:1.1rem;font-weight:600;letter-spacing:1px}
.wrap{max-width:520px;margin:0 auto}
.mimg{width:100%;background:#181818;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.mimg img{width:100%;max-height:100vw;object-fit:contain;display:block}
.mnoimg{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#F2F2F2,#E0E0E0);display:flex;align-items:center;justify-content:center;font-size:4.5rem}
.mbody{padding:18px 20px 32px}
.mnum{font-size:0.65rem;color:var(--rose);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.mkat{font-size:0.62rem;background:var(--blush);color:var(--rose);padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.mnama{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.6rem;margin-bottom:6px;line-height:1.3}
.mharga{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.mstok{display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.72rem;font-weight:600;margin-bottom:16px}
.sa{background:#FDEAEA;color:#C0392B}
.sh{background:#F5DADA;color:#B23A3A}
.mdesk{font-size:0.9rem;color:#6B6B6B;line-height:1.75;margin-bottom:20px;white-space:pre-line}
.mdiv{height:1px;background:var(--border);margin-bottom:18px}
.mact{display:flex;gap:10px;position:sticky;bottom:0;background:var(--bg);padding-top:10px}
.bwa{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;background:#25D366;color:white;border:none;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.bcm{flex:1;padding:14px;background:var(--dark);color:var(--blush);border:none;border-radius:12px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.bshare{width:42px;flex:0 0 42px;display:flex;align-items:center;justify-content:center;background:var(--ivory);border:1px solid var(--border);border-radius:12px;font-size:1.1rem;cursor:pointer}
.loading{text-align:center;padding:80px 20px;color:var(--muted)}
.spin{width:28px;height:28px;border:2.5px solid var(--blush);border-top-color:var(--rose);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:0.9rem;line-height:1.8}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--dark);color:#FFFFFF;padding:10px 22px;border-radius:30px;font-size:0.8rem;z-index:999;opacity:0;transition:opacity 0.3s;white-space:nowrap;border:1px solid #3A1F1F}
.toast.show{opacity:1}
.sec-title{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.1rem;margin-bottom:10px}
.related{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.rcard{flex:0 0 110px;cursor:pointer}
.rcard img{width:110px;height:135px;object-fit:cover;border-radius:10px;background:var(--blush);display:block}
.rcard .rnoimg{width:110px;height:135px;border-radius:10px;background:var(--blush);display:flex;align-items:center;justify-content:center;font-size:1.6rem}
.rcard .rnama{font-size:0.72rem;margin-top:5px;line-height:1.3;font-weight:500}
.rcard .rharga{font-size:0.72rem;color:var(--rose);font-weight:600}
</style>
</head>
<body>
<header>
<button class="bback" onclick="location.href='index.html'">←</button>
<div class="htitle"><h1>Detail Produk</h1></div>
<div style="width:34px"></div>
</header>
<div class="wrap" id="page"><div class="loading"><div class="spin"></div><p>Memuat produk...</p></div></div>
<div class="toast" id="toast"></div>
<script>
var SB = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
var KEY = 'sb_publishable_VP4uq4EYVSzcuBxDNZJ9Fg_OmmvoRm4';
var BUCKET = 'produk_images';
var WA = '6283857074963';
var sliderIdx=0;
var sliderFotos=[];

function hdrs() { return {'apikey':KEY,'Authorization':'Bearer '+KEY}; }
function iurl(p) { if(!p)return null; if(p.indexOf('http')===0)return p; return SB+'/storage/v1/object/public/'+BUCKET+'/'+p; }
function rp(h) { return 'Rp '+Number(h).toLocaleString('id-ID'); }
function num(n) { return n ? '#'+String(n).padStart(3,'0') : '#---'; }
function getId(){ var m=window.location.search.match(/id=([^&]+)/); return m?decodeURIComponent(m[1]):null; }

function getFotos(p) {
  var raw = p.produk_gambar || [];
  if (!Array.isArray(raw)) raw = [raw];
  var fotos = raw.filter(function(f){return f && f.url;}).sort(function(a,b){return (a.urutan||0)-(b.urutan||0);});
  if (fotos.length > 0) return fotos.map(function(f){return f.url;});
  if (p.gambar_url) return [p.gambar_url];
  return [];
}

function buatSlider(fotos) {
  if(!fotos.length) return '<div class="mnoimg">👗</div>';
  if(fotos.length===1) return '<div class="mimg"><img src="'+iurl(fotos[0])+'"></div>';
  sliderFotos=fotos; sliderIdx=0;
  var slides=fotos.map(function(f){return '<div style="min-width:100%;display:flex;align-items:center;justify-content:center;background:#181818"><img src="'+iurl(f)+'" style="width:100%;max-height:100vw;object-fit:contain;display:block"></div>';}).join('');
  var dots=fotos.map(function(_,i){return '<span onclick="goSlide('+i+')" style="width:7px;height:7px;border-radius:50%;background:'+(i===0?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.3)')+';cursor:pointer;display:inline-block"></span>';}).join('');
  return '<div class="mimg" style="aspect-ratio:auto">'+
    '<div id="slides" style="display:flex;transition:transform 0.3s ease;width:100%">'+slides+'</div>'+
    '<button onclick="goSlide(sliderIdx-1)" style="position:absolute;top:50%;left:8px;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;width:32px;height:32px;border-radius:50%;font-size:1.2rem;cursor:pointer">‹</button>'+
    '<button onclick="goSlide(sliderIdx+1)" style="position:absolute;top:50%;right:8px;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;width:32px;height:32px;border-radius:50%;font-size:1.2rem;cursor:pointer">›</button>'+
    '<div id="sdots" style="position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px">'+dots+'</div>'+
    '<div style="position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.5);color:white;font-size:0.65rem;padding:2px 8px;border-radius:10px" id="scnt">1/'+fotos.length+'</div>'+
  '</div>';
}

function goSlide(i) {
  if(!sliderFotos.length) return;
  sliderIdx=(i+sliderFotos.length)%sliderFotos.length;
  var slides=document.getElementById('slides');
  if(slides) slides.style.transform='translateX(-'+(sliderIdx*100)+'%)';
  var dots=document.querySelectorAll('#sdots span');
  dots.forEach(function(d,j){d.style.background=j===sliderIdx?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.3)';});
  var cnt=document.getElementById('scnt');
  if(cnt) cnt.textContent=(sliderIdx+1)+'/'+sliderFotos.length;
}

function renderRelated(list, kategori, excludeId) {
  var rel = list.filter(function(p){return p.kategori===kategori && p.id!==excludeId;}).slice(0,8);
  if(!rel.length) return '';
  var cards = rel.map(function(p){
    var fotos=getFotos(p);
    var img = fotos.length ? '<img src="'+iurl(fotos[0])+'" onerror="this.style.display=\'none\'">' : '<div class="rnoimg">👗</div>';
    return '<div class="rcard" onclick="location.href=\'produk.html?id='+p.id+'\'">'+img+
      '<div class="rnama">'+p.nama+'</div><div class="rharga">'+rp(p.harga)+'</div></div>';
  }).join('');
  return '<div class="mdiv"></div><div class="sec-title">Produk Sejenis</div><div class="related">'+cards+'</div>';
}

function tampilkan(p, semuaProduk) {
  var fotos=getFotos(p);
  var hbs=p.stok<=0;
  var html = buatSlider(fotos)+
    '<div class="mbody">'+
      '<div class="mnum">'+num(p.nomor)+' · '+fotos.length+' foto</div>'+
      (p.kategori?'<div class="mkat">'+p.kategori+'</div>':'')+
      '<div class="mnama">'+p.nama+'</div>'+
      '<div class="mharga">'+rp(p.harga)+'</div>'+
      '<span class="mstok '+(hbs?'sh':'sa')+'">'+(hbs?'✗ Stok Habis':'✓ Tersedia ('+p.stok+' pcs)')+'</span>'+
      (p.deskripsi?'<div class="mdesk">'+p.deskripsi+'</div>':'')+
      '<div class="mdiv"></div>'+
      '<div class="mact">'+
        '<button class="bshare" onclick="shareLink()">🔗</button>'+
        (hbs
          ? '<p style="color:#B23A3A;font-size:0.85rem;flex:1;text-align:center;align-self:center">Stok habis</p>'
          : '<button class="bcm" onclick="addCartGo()">🛒 Keranjang</button>'+
            '<button class="bwa" onclick="pesanWA(\''+p.nama.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\',\''+num(p.nomor)+'\','+p.harga+')">💬 WhatsApp</button>')+
      '</div>'+
      (semuaProduk ? renderRelated(semuaProduk, p.kategori, p.id) : '')+
    '</div>';
  document.getElementById('page').innerHTML = html;
  document.title = p.nama+' · Jenny\'s Thrift Shop';
  window._produkAktif = p;
}

function muat() {
  var id = getId();
  if(!id){ document.getElementById('page').innerHTML='<div class="empty">Produk tidak ditemukan.<br><a href="index.html">Kembali ke katalog</a></div>'; return; }
  var url = SB+'/rest/v1/produk?select=*,produk_gambar(id,url,urutan)&id=eq.'+encodeURIComponent(id);
  fetch(url, {headers:hdrs()})
  .then(function(r){return r.json();})
  .then(function(d){
    if(!Array.isArray(d) || !d.length){
      document.getElementById('page').innerHTML='<div class="empty">⚠️ Produk tidak ditemukan atau sudah dihapus.<br><a href="index.html">Kembali ke katalog</a></div>';
      return;
    }
    var p = d[0];
    // ambil semua produk sekategori untuk bagian "produk sejenis"
    var url2 = SB+'/rest/v1/produk?select=*,produk_gambar(id,url,urutan)&kategori=eq.'+encodeURIComponent(p.kategori||'')+'&order=nomor.asc';
    fetch(url2, {headers:hdrs()}).then(function(r2){return r2.json();}).then(function(d2){
      tampilkan(p, Array.isArray(d2)?d2:null);
    }).catch(function(){ tampilkan(p, null); });
  })
  .catch(function(e){
    document.getElementById('page').innerHTML='<div class="empty">⚠️ Gagal memuat: '+e.message+'</div>';
  });
}

function addCartGo() {
  var p = window._produkAktif;
  if(!p) return;
  try {
    var cart = JSON.parse(localStorage.getItem('jts_cart')||'[]');
  } catch(e){ var cart=[]; }
  var ada = cart.find(function(x){return x.id===p.id;});
  if(ada){ if(ada.qty<p.stok){ada.qty++;} }
  else { cart.push({id:p.id, num:num(p.nomor), nama:p.nama, harga:p.harga, foto:p.gambar_url, qty:1, stok:p.stok}); }
  localStorage.setItem('jts_cart', JSON.stringify(cart));
  showToast('✓ Ditambahkan ke keranjang');
}

function pesanWA(nama,nomor,harga){
  var p='Halo kak, saya tertarik:\n\n'+nomor+' *'+nama+'*\nHarga: '+rp(harga)+'\n\nApakah masih tersedia? 🙏';
  window.location.href='https://wa.me/'+WA+'?text='+encodeURIComponent(p);
}

function shareLink(){
  var url = window.location.href;
  if(navigator.share){
    navigator.share({title: document.title, url: url}).catch(function(){});
  } else {
    navigator.clipboard.writeText(url).then(function(){ showToast('✓ Link disalin'); });
  }
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

muat();
</script>
</body>
</html>

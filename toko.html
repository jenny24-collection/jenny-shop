<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenny24 Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #FAF7F2;
    --dark: #1A1A1A;
    --gold: #C9A96E;
    --soft: #F0EBE3;
    --muted: #888;
    --card-bg: #FFFFFF;
  }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--dark);
    padding: 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.6rem;
    letter-spacing: 2px;
  }

  header p {
    color: #aaa;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 16px;
    overflow-x: auto;
    background: var(--soft);
    border-bottom: 1px solid #E0D9D0;
  }

  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    white-space: nowrap;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #C5BBB0;
    background: transparent;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--dark);
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--dark);
    color: var(--gold);
    border-color: var(--dark);
  }

  .search-bar {
    padding: 12px 16px;
    background: var(--soft);
  }

  .search-bar input {
    width: 100%;
    padding: 10px 16px;
    border-radius: 24px;
    border: 1px solid #D0C9C0;
    background: white;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    outline: none;
  }

  .search-bar input:focus {
    border-color: var(--gold);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 16px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:active { transform: scale(0.98); }

  .card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    background: var(--soft);
  }

  .card-no-img {
    width: 100%;
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, #F0EBE3, #E5DDD4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }

  .card-info {
    padding: 10px 12px 14px;
  }

  .card-kategori {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .card-nama {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--dark);
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .card-harga {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--dark);
  }

  .card-stok {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .card-stok.habis { color: #E05050; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--soft);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    grid-column: 1/-1;
  }

  .empty-icon { font-size: 3rem; margin-bottom: 12px; }

  /* Modal detail */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: #DDD;
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--soft);
    margin-bottom: 16px;
  }

  .modal-no-img {
    width: 100%;
    border-radius: 12px;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #F0EBE3, #E5DDD4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    margin-bottom: 16px;
  }

  .modal-kategori {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 6px;
  }

  .modal-nama {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    margin-bottom: 8px;
  }

  .modal-harga {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 8px;
  }

  .modal-stok {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
    margin-bottom: 16px;
  }

  .stok-ada { background: #E8F5E9; color: #2E7D32; }
  .stok-habis { background: #FFEBEE; color: #C62828; }

  .modal-deskripsi {
    font-size: 0.9rem;
    color: #555;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .btn-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  .btn-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--soft);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal { position: relative; }

  footer {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--soft);
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Jenny24 Collection</h1>
  <p>Fashion & Style</p>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 Cari produk...">
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterKategori('semua', this)">Semua</button>
</div>

<div class="grid" id="produkGrid">
  <div class="loading" style="grid-column:1/-1">
    <div class="loading-spinner"></div>
    <p>Memuat produk...</p>
  </div>
</div>

<!-- Modal Detail -->
<div class="modal-overlay" id="modalOverlay" onclick="tutupModal(event)">
  <div class="modal" id="modalKonten">
    <div class="modal-handle"></div>
    <button class="btn-close" onclick="tutupModal()">✕</button>
    <div id="modalIsi"></div>
  </div>
</div>

<footer>
  © 2024 Jenny24 Collection · Semua produk tersedia
</footer>

<script>
const SUPABASE_URL = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYmtkaG11dGllcml5anFzaWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjA0MzIsImV4cCI6MjA5NzQ5NjQzMn0.EEBWrk2kI98owsQNlOOPGBmLzXHQGoUBJqsOyl7lTrc';
const BUCKET = 'produk_images';

let semuaProduk = [];
let kategoriAktif = 'semua';

async function fetchProduk() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/produk?select=*&order=created_at.desc`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      }
    });
    const data = await res.json();
    semuaProduk = data;
    renderKategori(data);
    renderProduk(data);
  } catch(e) {
    document.getElementById('produkGrid').innerHTML = 
      '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">⚠️</div><p>Gagal memuat produk</p></div>';
  }
}

function renderKategori(produk) {
  const kategori = [...new Set(produk.map(p => p.kategori).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '<button class="filter-btn active" onclick="filterKategori(\'semua\', this)">Semua</button>';
  kategori.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = k;
    btn.onclick = function() { filterKategori(k, this); };
    bar.appendChild(btn);
  });
}

function filterKategori(kat, el) {
  kategoriAktif = kat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  cariDanFilter();
}

function cariDanFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let hasil = semuaProduk;
  if (kategoriAktif !== 'semua') hasil = hasil.filter(p => p.kategori === kategoriAktif);
  if (q) hasil = hasil.filter(p => p.nama.toLowerCase().includes(q) || (p.deskripsi||'').toLowerCase().includes(q));
  renderProduk(hasil);
}

function gambarUrl(path) {
  if (!path) return null;
  if (path.startsWith('http')) return path;
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

function formatHarga(h) {
  return 'Rp ' + Number(h).toLocaleString('id-ID');
}

function renderProduk(produk) {
  const grid = document.getElementById('produkGrid');
  if (!produk.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">👗</div><p>Tidak ada produk ditemukan</p></div>';
    return;
  }
  grid.innerHTML = produk.map(p => `
    <div class="card" onclick="bukaModal(${p.id ? `'${p.id}'` : null})">
      ${p.gambar_url 
        ? `<img src="${gambarUrl(p.gambar_url)}" alt="${p.nama}" onerror="this.parentElement.querySelector('.card-no-img') && (this.style.display='none')">`
        : `<div class="card-no-img">👗</div>`}
      <div class="card-info">
        ${p.kategori ? `<div class="card-kategori">${p.kategori}</div>` : ''}
        <div class="card-nama">${p.nama}</div>
        <div class="card-harga">${formatHarga(p.harga)}</div>
        <div class="card-stok ${p.stok > 0 ? '' : 'habis'}">${p.stok > 0 ? `Stok: ${p.stok}` : 'Habis'}</div>
      </div>
    </div>
  `).join('');

  // Store produk data for modal
  window._produkData = produk;
}

function bukaModal(id) {
  const p = window._produkData.find(x => x.id == id);
  if (!p) return;
  
  document.getElementById('modalIsi').innerHTML = `
    ${p.gambar_url 
      ? `<img src="${gambarUrl(p.gambar_url)}" alt="${p.nama}">`
      : `<div class="modal-no-img">👗</div>`}
    ${p.kategori ? `<div class="modal-kategori">${p.kategori}</div>` : ''}
    <div class="modal-nama">${p.nama}</div>
    <div class="modal-harga">${formatHarga(p.harga)}</div>
    <span class="modal-stok ${p.stok > 0 ? 'stok-ada' : 'stok-habis'}">
      ${p.stok > 0 ? `✓ Tersedia (${p.stok} pcs)` : '✗ Stok Habis'}
    </span>
    ${p.deskripsi ? `<div class="modal-deskripsi">${p.deskripsi}</div>` : ''}
    ${p.stok > 0 ? `<button class="btn-wa" onclick="pesanWA('${p.nama}', ${p.harga})">
      <span>💬</span> Pesan via WhatsApp
    </button>` : ''}
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

function tutupModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.target.classList.contains('btn-close')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

function pesanWA(nama, harga) {
  const pesan = `Halo, saya tertarik dengan produk *${nama}* seharga *${formatHarga(harga)}*. Apakah masih tersedia?`;
  window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`, '_blank');
}

document.getElementById('searchInput').addEventListener('input', cariDanFilter);

fetchProduk();
</script>
</body>
</html>

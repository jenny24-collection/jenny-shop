<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Jenny's Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

    <!-- Form Login (Hanya muncul jika belum login) -->
    <div id="auth-section" class="max-w-xs mx-auto mt-20 bg-white p-6 rounded-2xl shadow-xl">
        <h2 class="text-xl font-bold mb-4 text-center">Login Admin</h2>
        <input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-2 rounded-lg">
        <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded-lg">
        <button onclick="login()" class="w-full bg-pink-600 hover:bg-pink-700 text-white p-2 rounded-lg font-semibold">Masuk</button>
    </div>

    <!-- Dasbor Admin (Hanya muncul jika sudah login) -->
    <div id="admin-section" class="hidden max-w-md mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <h2 class="text-xl font-bold mb-4">Tambah Produk Baru</h2>
        <input id="nama" type="text" placeholder="Nama Produk" class="w-full border p-2 mb-2 rounded-lg">
        <input id="harga" type="number" placeholder="Harga" class="w-full border p-2 mb-2 rounded-lg">
        <textarea id="deskripsi" placeholder="Deskripsi" class="w-full border p-2 mb-4 rounded-lg"></textarea>
        <button onclick="tambahProduk()" class="w-full bg-green-600 hover:bg-green-700 text-white p-2 rounded-lg font-semibold mb-2">Simpan ke Katalog</button>
        <button onclick="logout()" class="w-full text-red-500 text-sm hover:underline">Keluar</button>
    </div>

    <script>
        // Inisialisasi Supabase
        const supabase = supabase.createClient(
            'https://fkbkdhmutieriyjqsiaz.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYmtkaG11dGllcml5anFzaWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjA0MzIsImV4cCI6MjA5NzQ5NjQzMn0.EEBWrk2kI98owsQNlOOPGBmLzXHQGoUBJqsOyl7lTrc'
        );

        // Fungsi untuk mengontrol tampilan
        function updateUI(session) {
            const authSection = document.getElementById('auth-section');
            const adminSection = document.getElementById('admin-section');
            
            if (session) {
                authSection.classList.add('hidden');
                adminSection.classList.remove('hidden');
            } else {
                authSection.classList.remove('hidden');
                adminSection.classList.add('hidden');
            }
        }

        // Deteksi perubahan status login (Langsung pindah halaman saat login/logout)
        supabase.auth.onAuthStateChange((event, session) => {
            updateUI(session);
        });

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) alert("Login Gagal: " + error.message);
        }

        async function tambahProduk() {
            const nama = document.getElementById('nama').value;
            const harga = document.getElementById('harga').value;
            const deskripsi = document.getElementById('deskripsi').value;

            const { error } = await supabase.from('produk').insert([{ nama, harga, deskripsi }]);
            
            if (error) {
                alert("Error: " + error.message);
            } else { 
                alert('Produk berhasil ditambahkan!'); 
                // Bersihkan input
                document.getElementById('nama').value = '';
                document.getElementById('harga').value = '';
                document.getElementById('deskripsi').value = '';
            }
        }

        async function logout() {
            await supabase.auth.signOut();
        }
    </script>
</body
  >
      </html>

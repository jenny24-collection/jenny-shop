<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Jenny Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Dashboard Admin</h1>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4 text-pink-600">Tambah Produk Baru</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nama" placeholder="Nama Produk" class="border p-3 rounded-lg outline-none">
                <input type="number" id="harga" placeholder="Harga" class="border p-3 rounded-lg outline-none">
                <input type="text" id="kategori" placeholder="Kategori" class="border p-3 rounded-lg outline-none">
                <input type="file" id="imageInput" accept="image/*" class="border p-2 rounded-lg">
                <textarea id="deskripsi" placeholder="Deskripsi Produk" class="border p-3 rounded-lg outline-none md:col-span-2 h-24"></textarea>
            </div>
            <button id="btnSimpan" onclick="tambahProduk()" class="mt-4 w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-lg">Simpan Produk</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <table class="w-full text-left">
                <thead><tr class="border-b"><th class="py-2">Produk</th><th class="py-2">Deskripsi</th><th class="py-2">Harga</th><th class="py-2">Aksi</th></tr></thead>
                <tbody id="tabelProduk"></tbody>
            </table>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function loadProduk() {
            const { data } = await supabase.from('produk').select('*');
            const tabel = document.getElementById('tabelProduk');
            tabel.innerHTML = '';
            data?.forEach(p => {
                tabel.innerHTML += `
                    <tr class="border-b">
                        <td class="py-3 font-medium">${p.nama}</td>
                        <td class="py-3 text-sm text-gray-600 truncate max-w-xs">${p.deskripsi || '-'}</td>
                        <td class="py-3">Rp ${p.harga.toLocaleString()}</td>
                        <td class="py-3">
                            <button onclick="hapusProduk(${p.id})" class="text-red-500 mr-3">Hapus</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function tambahProduk() {
            const btn = document.getElementById('btnSimpan');
            const file = document.getElementById('imageInput').files[0];
            if (!file) return alert("Pilih gambar!");
            
            btn.innerText = "Mengunggah...";
            const fileName = `${Date.now()}_${file.name}`;
            await supabase.storage.from('produk_images').upload(fileName, file);
            const { data: urlData } = supabase.storage.from('produk_images').getPublicUrl(fileName);

            await supabase.from('produk').insert([{
                nama: document.getElementById('nama').value,
                harga: parseInt(document.getElementById('harga').value),
                kategori: document.getElementById('kategori').value,
                deskripsi: document.getElementById('deskripsi').value, // Ambil nilai deskripsi
                gambar_url: urlData.publicUrl
            }]);
            
            alert("Berhasil ditambah!");
            btn.innerText = "Simpan Produk";
            loadProduk();
        }

        async function hapusProduk(id) {
            if (!confirm("Yakin ingin menghapus?")) return;
            await supabase.from('produk').delete().eq('id', id);
            loadProduk();
        }

        loadProduk();
    </script>
</body>
</html>

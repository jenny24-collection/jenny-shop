<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Jenny Collection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #d63384; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Admin: Tambah Produk</h2>
    <input type="text" id="nama" placeholder="Nama Produk">
    <input type="number" id="harga" placeholder="Harga">
    <input type="text" id="kategori" placeholder="Kategori">
    <input type="text" id="gambar_url" placeholder="URL Gambar (Link Foto)">
    <button onclick="tambahProduk()">Simpan Produk ke Katalog</button>

    <script>
        const SUPABASE_URL = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_VP4uq4EYVSzcuBxDNZJ9Fg_OmmvoRm4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function tambahProduk() {
            const produkBaru = {
                nama: document.getElementById('nama').value,
                harga: parseInt(document.getElementById('harga').value),
                kategori: document.getElementById('kategori').value,
                gambar_url: document.getElementById('gambar_url').value
            };

            const { error } = await supabase.from('produk').insert([produkBaru]);

            if (error) {
                alert("Gagal: " + error.message);
            } else {
                alert("Berhasil! Produk sudah masuk ke katalog.");
                location.reload();
            }
        }
    </script>
</body>
</html>

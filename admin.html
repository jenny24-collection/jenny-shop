<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Jenny's Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">

    <div id="auth-section" class="max-w-xs mx-auto mt-20 bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">Login Admin</h2>
        <input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-2 rounded">
        <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded">
        <button onclick="login()" class="w-full bg-pink-600 text-white p-2 rounded">Masuk</button>
    </div>

    <div id="admin-section" class="hidden max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">Tambah Produk Baru</h2>
        <input id="nama" type="text" placeholder="Nama Produk" class="w-full border p-2 mb-2 rounded">
        <input id="harga" type="number" placeholder="Harga" class="w-full border p-2 mb-2 rounded">
        <textarea id="deskripsi" placeholder="Deskripsi" class="w-full border p-2 mb-2 rounded"></textarea>
        <button onclick="tambahProduk()" class="w-full bg-green-600 text-white p-2 rounded">Simpan ke Katalog</button>
        <button onclick="logout()" class="w-full mt-4 text-red-500 text-sm">Keluar</button>
    </div>

    <script>
        const supabase = supabase.createClient('https://fkbkdhmutieriyjqsiaz.supabase.co', 'YOUR_SUPABASE_ANON_KEY');

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) alert(error.message);
            else location.reload();
        }

        async function tambahProduk() {
            const nama = document.getElementById('nama').value;
            const harga = document.getElementById('harga').value;
            const deskripsi = document.getElementById('deskripsi').value;

            const { error } = await supabase.from('produk').insert([{ nama, harga, deskripsi }]);
            if (error) alert(error.message);
            else { alert('Berhasil!'); location.reload(); }
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // Cek status login
        supabase.auth.getSession().then(({ data }) => {
            if (data.session) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>

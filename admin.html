<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Jenny's Thrift Shop</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#F8F5F0; color:#1C1917; }

#loginScreen {
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:24px; background:#1C1917;
}
.logo { font-size:1.8rem; font-weight:700; color:#E8D5D5; letter-spacing:2px; margin-bottom:4px; font-family:Georgia,serif; }
.logo-sub { color:#5A504A; font-size:0.72rem; letter-spacing:4px; margin-bottom:40px; text-transform:uppercase; }
.login-box { background:#242120; border-radius:16px; padding:28px 24px; width:100%; max-width:360px; border:1px solid #3A3330; }
.login-box h2 { color:#E8D5D5; font-size:1rem; margin-bottom:20px; font-weight:500; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:0.72rem; color:#7A6E68; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.field input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #3A3330; background:#2E2B29; color:#E8D5D5; font-size:0.95rem; outline:none; }
.field input:focus { border-color:#9D6E6E; }
.btn-login { width:100%; padding:13px; background:#9D6E6E; color:white; border:none; border-radius:10px; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:6px; }
.login-err { color:#C07070; font-size:0.8rem; text-align:center; margin-top:10px; display:none; }

#adminScreen { display:none; }
.top-bar { background:#1C1917; padding:13px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid #2C2825; }
.top-bar h1 { color:#E8D5D5; font-size:0.95rem; font-family:Georgia,serif; letter-spacing:1px; }
.btn-out { background:transparent; border:1px solid #3A3330; color:#7A6E68; padding:6px 12px; border-radius:8px; font-size:0.72rem; cursor:pointer; }

.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px; background:#FAF6F1; border-bottom:1px solid #E5DDD6; }
.stat { background:white; border-radius:10px; padding:10px; text-align:center; border:1px solid #E5DDD6; }
.stat-n { font-size:1.5rem; font-weight:700; color:#1C1917; }
.stat-l { font-size:0.62rem; color:#9A9089; text-transform:uppercase; margin-top:2px; letter-spacing:0.5px; }

.btn-tambah { margin:14px; display:flex; align-items:center; justify-content:center; gap:8px; padding:13px; background:#1C1917; color:#E8D5D5; border:none; border-radius:12px; font-size:0.92rem; font-weight:700; cursor:pointer; width:calc(100% - 28px); }

.list { padding:0 14px 80px; display:flex; flex-direction:column; gap:10px; }
.item { background:white; border-radius:12px; padding:12px; display:flex; gap:12px; align-items:center; border:1px solid #E5DDD6; }
.item-img { width:60px; height:60px; border-radius:8px; object-fit:cover; background:#E8D5D5; flex-shrink:0; }
.item-noimg { width:60px; height:60px; border-radius:8px; background:#EDE0DC; display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
.item-info { flex:1; min-width:0; }
.item-num { font-size:0.6rem; color:#9D6E6E; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
.item-nama { font-weight:700; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.item-harga { font-size:0.8rem; color:#9D6E6E; font-weight:600; margin-top:2px; }
.item-meta { font-size:0.68rem; color:#9A9089; margin-top:2px; }
.item-btns { display:flex; flex-direction:column; gap:6px; }
.btn-edit { padding:6px 14px; border-radius:8px; font-size:0.72rem; background:#FAF6F1; color:#1C1917; border:1px solid #E5DDD6; cursor:pointer; }
.btn-del { padding:6px 14px; border-radius:8px; font-size:0.72rem; background:#FFF0F0; color:#B85C5C; border:1px solid #FFCDD2; cursor:pointer; }

/* MODAL */
.overlay { display:none; position:fixed; inset:0; background:rgba(28,25,23,0.6); z-index:200; align-items:flex-end; }
.overlay.show { display:flex; }
.modal { background:white; border-radius:24px 24px 0 0; width:100%; max-height:92vh; overflow-y:auto; padding:24px; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; background:#E5DDD6; border-radius:2px; margin:0 auto 20px; }
.modal h2 { font-size:1rem; margin-bottom:18px; font-weight:700; }
.mfield { margin-bottom:14px; }
.mfield label { display:block; font-size:0.7rem; color:#9A9089; margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
.mfield input, .mfield select, .mfield textarea { width:100%; padding:11px 14px; border-radius:10px; border:1px solid #E5DDD6; background:#FAF6F1; color:#1C1917; font-size:0.92rem; font-family:Arial,sans-serif; outline:none; }
.mfield input:focus, .mfield select:focus, .mfield textarea:focus { border-color:#9D6E6E; }

/* FOTO PREVIEW GRID */
.foto-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:10px; }
.foto-thumb { position:relative; aspect-ratio:1; border-radius:8px; overflow:hidden; background:#EDE0DC; }
.foto-thumb img { width:100%; height:100%; object-fit:cover; }
.foto-thumb .foto-del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,0.6); color:white; border:none; border-radius:50%; width:22px; height:22px; font-size:0.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.foto-thumb.add-btn { border:2px dashed #E5DDD6; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; font-size:1.5rem; color:#C5B8B0; gap:4px; }
.foto-thumb.add-btn span { font-size:0.65rem; color:#C5B8B0; }
#fileInput { display:none; }
.foto-count { font-size:0.7rem; color:#9A9089; text-align:center; margin-bottom:12px; }

.btn-save { width:100%; padding:13px; background:#1C1917; color:#E8D5D5; border:none; border-radius:12px; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:8px; }
.btn-cancel { width:100%; padding:11px; background:transparent; color:#9A9089; border:1px solid #E5DDD6; border-radius:12px; font-size:0.88rem; cursor:pointer; margin-top:8px; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1C1917; color:#E8D5D5; padding:10px 22px; border-radius:30px; font-size:0.8rem; z-index:999; opacity:0; transition:opacity 0.3s; white-space:nowrap; border:1px solid #3C3530; }
.toast.show { opacity:1; }

#loadingEl { position:fixed; inset:0; background:rgba(255,255,255,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; z-index:500; font-size:0.88rem; color:#9A9089; }
#loadingEl.show { display:flex; }
.spin { width:32px; height:32px; border:3px solid #E8D5D5; border-top-color:#9D6E6E; border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">Jenny's Thrift Shop</div>
  <div class="logo-sub">Admin Panel</div>
  <div class="login-box">
    <h2>Masuk ke Dashboard</h2>
    <div class="field"><label>Username</label><input type="text" id="inUser" placeholder="admin"></div>
    <div class="field"><label>Password</label><input type="password" id="inPass" placeholder="••••••"></div>
    <button class="btn-login" type="button" onclick="doLogin()">Masuk</button>
    <div class="login-err" id="loginErr">Username atau password salah!</div>
  </div>
</div>

<div id="adminScreen">
  <div class="top-bar">
    <h1>Jenny's Thrift Shop</h1>
    <button class="btn-out" onclick="doLogout()">Keluar</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Produk</div></div>
    <div class="stat"><div class="stat-n" id="sAda">0</div><div class="stat-l">Ada Stok</div></div>
    <div class="stat"><div class="stat-n" id="sHabis">0</div><div class="stat-l">Habis</div></div>
  </div>
  <button class="btn-tambah" type="button" onclick="bukaTambah()">＋ Tambah Produk Baru</button>
  <div class="list" id="listProduk"><p style="text-align:center;padding:40px;color:#9A9089">Memuat...</p></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalJudul">Tambah Produk</h2>

    <div class="foto-grid" id="fotoGrid"></div>
    <div class="foto-count" id="fotoCount">0 / 20 foto</div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="onFileChange(this)">

    <div class="mfield"><label>Nama Produk *</label><input type="text" id="fNama" placeholder="Contoh: Dress Bunga"></div>
    <div class="mfield"><label>Harga (Rp) *</label><input type="number" id="fHarga" placeholder="150000"></div>
    <div class="mfield">
      <label>Kategori</label>
      <select id="fKat">
        <option value="">Pilih kategori</option>
        <option>Atasan</option><option>Bawahan</option><option>Dress</option>
        <option>Outer</option><option>Aksesoris</option><option>Sepatu</option>
        <option>Tas</option><option>Lainnya</option>
      </select>
    </div>
    <div class="mfield"><label>Stok</label><input type="number" id="fStok" value="0"></div>
    <div class="mfield"><label>Deskripsi</label><textarea id="fDesk" rows="3" placeholder="Deskripsi produk..."></textarea></div>
    <button class="btn-save" type="button" onclick="simpan()">💾 Simpan Produk</button>
    <button class="btn-cancel" type="button" onclick="tutupModal()">Batal</button>
  </div>
</div>

<div id="loadingEl"><div class="spin"></div><span id="loadingTxt">Memuat...</span></div>
<div class="toast" id="toastEl"></div>

<script>
const URL_SB = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
const KEY_SB = 'sb_publishable_VP4uq4EYVSzcuBxDNZJ9Fg_OmmvoRm4';
const BUCKET = 'produk_images';
const MAX_FOTO = 20;

var editId = null;
var dataProduk = [];
var fotoList = []; // {url, file, isNew}

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

async function doLogin() {
  var u = document.getElementById('inUser').value.trim();
  var p = document.getElementById('inPass').value;
  var errEl = document.getElementById('loginErr');
  var btn = document.querySelector('.btn-login');
  errEl.style.display = 'none';
  if (!u || !p) { errEl.textContent = 'Username dan password wajib diisi!'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Memeriksa...'; btn.disabled = true;
  try {
    var hash = await sha256(p);
    var res = await fetch(URL_SB + '/rest/v1/admin_users?username=eq.' + encodeURIComponent(u) + '&password_hash=eq.' + hash + '&select=id,username', {
      headers: { 'apikey': KEY_SB, 'Authorization': 'Bearer ' + KEY_SB }
    });
    var data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      fetch(URL_SB + '/rest/v1/admin_users?id=eq.' + data[0].id, {
        method: 'PATCH',
        headers: { 'apikey': KEY_SB, 'Authorization': 'Bearer ' + KEY_SB, 'Content-Type': 'application/json' },
        body: JSON.stringify({ last_login: new Date().toISOString() })
      });
      var expiry = Date.now() + (8 * 60 * 60 * 1000);
      sessionStorage.setItem('adm', JSON.stringify({ id: data[0].id, exp: expiry }));
      tampilAdmin();
    } else {
      errEl.textContent = 'Username atau password salah!';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Gagal terhubung ke server!';
    errEl.style.display = 'block';
  }
  btn.textContent = 'Masuk'; btn.disabled = false;
}

function doLogout() { sessionStorage.removeItem('adm'); location.reload(); }

function tampilAdmin() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  loadProduk();
}

function cekSession() {
  var s = sessionStorage.getItem('adm');
  if (!s) return false;
  try {
    var obj = JSON.parse(s);
    if (Date.now() > obj.exp) { sessionStorage.removeItem('adm'); return false; }
    return true;
  } catch(e) { return false; }
}

document.getElementById('inPass').onkeydown = function(e) { if(e.key==='Enter') doLogin(); };
if (cekSession()) tampilAdmin();

function hdrs(ct) {
  var h = { 'apikey': KEY_SB, 'Authorization': 'Bearer ' + KEY_SB };
  if (ct) h['Content-Type'] = ct;
  return h;
}

function loadProduk() {
  fetch(URL_SB + '/rest/v1/produk?select=*&order=nomor.asc', { headers: hdrs() })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!Array.isArray(data)) { toast('❌ ' + (data.message||'Error')); return; }
      dataProduk = data;
      renderStats(data);
      renderList(data);
    })
    .catch(function(e) { toast('❌ ' + e.message); });
}

function renderStats(data) {
  document.getElementById('sTotal').textContent = data.length;
  document.getElementById('sAda').textContent = data.filter(function(p){return p.stok>0;}).length;
  document.getElementById('sHabis').textContent = data.filter(function(p){return p.stok<=0;}).length;
}

function fmtHarga(h) { return 'Rp ' + Number(h).toLocaleString('id-ID'); }

function imgUrl(path) {
  if (!path) return null;
  if (path.indexOf('http')===0) return path;
  return URL_SB + '/storage/v1/object/public/' + BUCKET + '/' + path;
}

function renderList(data) {
  var el = document.getElementById('listProduk');
  if (!data.length) { el.innerHTML = '<p style="text-align:center;padding:40px;color:#9A9089">Belum ada produk.</p>'; return; }
  el.innerHTML = data.map(function(p, i) {
    var thumb = p.gambar_url || null;
    var imgHtml = thumb
      ? '<img class="item-img" src="' + imgUrl(thumb) + '" onerror="this.style.display=\'none\'">'
      : '<div class="item-noimg">👗</div>';
    return '<div class="item">' + imgHtml +
      '<div class="item-info">' +
        '<div class="item-num">#' + String(p.nomor).padStart(3,'0') + '</div>' +
        '<div class="item-nama">' + p.nama + '</div>' +
        '<div class="item-harga">' + fmtHarga(p.harga) + '</div>' +
        '<div class="item-meta">' + (p.kategori||'') + ' · Stok: ' + p.stok + '</div>' +
      '</div>' +
      '<div class="item-btns">' +
        '<button class="btn-edit" onclick="bukaEdit(\'' + p.id + '\')">Edit</button>' +
        '<button class="btn-del" onclick="hapus(\'' + p.id + '\',\'' + p.nama.replace(/'/g,"\\'") + '\')">Hapus</button>' +
      '</div></div>';
  }).join('');
}

// ---- FOTO MANAGER ----
function renderFotoGrid() {
  var grid = document.getElementById('fotoGrid');
  var count = fotoList.length;
  document.getElementById('fotoCount').textContent = count + ' / ' + MAX_FOTO + ' foto';
  var html = fotoList.map(function(f, i) {
    return '<div class="foto-thumb">' +
      '<img src="' + (f.preview || imgUrl(f.url)) + '">' +
      '<button class="foto-del" onclick="hapusFoto(' + i + ')">✕</button>' +
    '</div>';
  }).join('');
  if (count < MAX_FOTO) {
    html += '<div class="foto-thumb add-btn" onclick="document.getElementById(\'fileInput\').click()">' +
      '<span>📷</span><span>Tambah</span></div>';
  }
  grid.innerHTML = html;
}

function onFileChange(input) {
  var files = Array.from(input.files);
  var sisa = MAX_FOTO - fotoList.length;
  if (files.length > sisa) { toast('⚠️ Maks ' + MAX_FOTO + ' foto. Hanya ' + sisa + ' diambil.'); files = files.slice(0, sisa); }
  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      fotoList.push({ file: file, preview: e.target.result, isNew: true });
      renderFotoGrid();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function hapusFoto(i) {
  fotoList.splice(i, 1);
  renderFotoGrid();
}

// ---- FORM ----
function bukaTambah() {
  editId = null; fotoList = [];
  document.getElementById('modalJudul').textContent = '+ Tambah Produk';
  document.getElementById('fNama').value = '';
  document.getElementById('fHarga').value = '';
  document.getElementById('fKat').value = '';
  document.getElementById('fStok').value = '0';
  document.getElementById('fDesk').value = '';
  renderFotoGrid();
  document.getElementById('overlay').classList.add('show');
}

function bukaEdit(id) {
  var p = dataProduk.find(function(x){return x.id===id;});
  if (!p) return;
  editId = id;
  var fotos = p.gambar_url ? [{ url: p.gambar_url, isNew: false }] : [];
  fotoList = fotos;
  document.getElementById('modalJudul').textContent = '✏️ Edit Produk #' + String(p.nomor).padStart(3,'0');
  document.getElementById('fNama').value = p.nama;
  document.getElementById('fHarga').value = p.harga;
  document.getElementById('fKat').value = p.kategori || '';
  document.getElementById('fStok').value = p.stok || 0;
  document.getElementById('fDesk').value = p.deskripsi || '';
  renderFotoGrid();
  document.getElementById('overlay').classList.add('show');
}

function tutupModal() { document.getElementById('overlay').classList.remove('show'); }

async function uploadFoto(file) {
  var ext = file.name.split('.').pop();
  var nama = Date.now() + '_' + Math.random().toString(36).substr(2,5) + '.' + ext;
  var res = await fetch(URL_SB + '/storage/v1/object/' + BUCKET + '/' + nama, {
    method: 'POST',
    headers: { 'apikey': KEY_SB, 'Authorization': 'Bearer ' + KEY_SB, 'Content-Type': file.type, 'x-upsert': 'true' },
    body: file
  });
  if (!res.ok) throw new Error('Upload gagal');
  return nama;
}

async function simpan() {
  var nama = document.getElementById('fNama').value.trim();
  var harga = document.getElementById('fHarga').value;
  if (!nama || !harga) { toast('⚠️ Nama dan harga wajib!'); return; }

  loading('Menyimpan produk...');

  try {
    // Upload foto baru
    var fotosBaru = fotoList.filter(function(f){return f.isNew;});
    var fotosLama = fotoList.filter(function(f){return !f.isNew;});

    for (var i=0; i<fotosBaru.length; i++) {
      loading('Upload foto ' + (i+1) + '/' + fotosBaru.length + '...');
      var namaFile = await uploadFoto(fotosBaru[i].file);
      fotosBaru[i].uploadedUrl = namaFile;
    }

    // Simpan produk
    var firstFoto = fotoList.length > 0 ? (fotoList[0].isNew ? fotosBaru[0].uploadedUrl : fotosLama[0].url) : null;
    var payload = {
      nama: nama, harga: Number(harga),
      kategori: document.getElementById('fKat').value || null,
      stok: Number(document.getElementById('fStok').value) || 0,
      deskripsi: document.getElementById('fDesk').value.trim() || null,
      gambar_url: firstFoto
    };

    var h = hdrs('application/json');
    h['Prefer'] = 'return=representation';

    var produkRes;
    if (editId) {
      produkRes = await fetch(URL_SB + '/rest/v1/produk?id=eq.' + editId, {
        method: 'PATCH', headers: h, body: JSON.stringify(payload)
      });
    } else {
      produkRes = await fetch(URL_SB + '/rest/v1/produk', {
        method: 'POST', headers: h, body: JSON.stringify(payload)
      });
    }

    var produkData = await produkRes.json();
    var produkId = editId || (Array.isArray(produkData) ? produkData[0].id : produkData.id);

    // Update tabel produk_gambar
    if (editId) {
      // Hapus foto lama yang dihapus user
      var idsLama = fotosLama.map(function(f){return f.id;});
      var produkAwal = dataProduk.find(function(x){return x.id===editId;});
      var semuaIdLama = (produkAwal.produk_gambar||[]).map(function(f){return f.id;});
      var idHapus = semuaIdLama.filter(function(id){return idsLama.indexOf(id)===-1;});
      for (var j=0; j<idHapus.length; j++) {
        await fetch(URL_SB + '/rest/v1/produk_gambar?id=eq.' + idHapus[j], { method:'DELETE', headers:hdrs() });
      }
    }

    // Insert foto baru
    var insertFotos = fotosBaru.map(function(f, idx) {
      return { produk_id: produkId, url: f.uploadedUrl, urutan: fotosLama.length + idx };
    });
    if (insertFotos.length > 0) {
      await fetch(URL_SB + '/rest/v1/produk_gambar', {
        method: 'POST', headers: hdrs('application/json'), body: JSON.stringify(insertFotos)
      });
    }

    hideLoading();
    tutupModal();
    toast(editId ? '✅ Produk diupdate!' : '✅ Produk ditambahkan!');
    loadProduk();

  } catch(e) { hideLoading(); toast('❌ ' + e.message); }
}

async function hapus(id, nama) {
  if (!confirm('Hapus produk "' + nama + '"?')) return;
  loading('Menghapus...');
  await fetch(URL_SB + '/rest/v1/produk_gambar?produk_id=eq.' + id, { method:'DELETE', headers:hdrs() });
  var res = await fetch(URL_SB + '/rest/v1/produk?id=eq.' + id, { method:'DELETE', headers:hdrs() });
  hideLoading();
  if (res.ok || res.status===204) { toast('🗑️ Produk dihapus'); loadProduk(); }
  else { toast('❌ Gagal menghapus'); }
}

function loading(txt) { document.getElementById('loadingTxt').textContent=txt; document.getElementById('loadingEl').classList.add('show'); }
function hideLoading() { document.getElementById('loadingEl').classList.remove('show'); }
function toast(msg) { var t=document.getElementById('toastEl'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000); }
</script>
</body>
</html>

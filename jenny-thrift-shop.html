<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenny's Thrift Shop</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAFA;--dark:#181818;--rose:#E63946;--blush:#F4D6D6;--ivory:#FFFFFF;--muted:#8A8A8A;--border:#E8E8E8}
body{background:var(--bg);color:var(--dark);font-family:'Inter',sans-serif;min-height:100vh}
header{background:#1E3A5F;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.htitle{text-align:center;flex:1}
.htitle h1{font-family:'Cormorant Garamond',serif;color:#FFFFFF;font-size:1.4rem;font-weight:600;letter-spacing:1.5px}
.htitle p{color:#9FB8D6;font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;margin-top:1px}
.bcart{position:relative;background:transparent;border:none;color:#FFFFFF;font-size:1.4rem;cursor:pointer;padding:4px;width:40px}
.bcart.pulse{animation:cartPulse 0.5s ease}
@keyframes cartPulse{0%{transform:scale(1)}30%{transform:scale(1.35)}50%{transform:scale(0.95)}100%{transform:scale(1)}}
.badge.pulse{animation:badgeFlash 0.5s ease}
@keyframes badgeFlash{0%{background:var(--rose)}40%{background:#FFD23F;box-shadow:0 0 0 6px rgba(255,210,63,0.35)}100%{background:var(--rose);box-shadow:none}}
.badge{position:absolute;top:-2px;right:-2px;background:var(--rose);color:white;font-size:0.55rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center}
.sbar{padding:12px 16px;background:var(--ivory);border-bottom:1px solid var(--border)}
.sbar input{width:100%;padding:10px 18px;border-radius:30px;border:1px solid var(--border);background:white;font-size:0.85rem;outline:none;font-family:'Inter',sans-serif}
.sbar input:focus{border-color:var(--rose)}
.toolbar{display:flex;gap:8px;padding:10px 16px;background:var(--ivory);border-bottom:1px solid var(--border)}
.selwrap{position:relative;flex:1}
.selwrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:0.7rem;color:var(--muted);pointer-events:none}
.selkat{width:100%;appearance:none;-webkit-appearance:none;padding:8px 30px 8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--ivory);font-size:0.78rem;color:var(--dark);font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;outline:none}
.selkat:focus{border-color:var(--rose)}
.burut{white-space:nowrap;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:0.78rem;cursor:pointer;color:var(--dark);font-family:'Inter',sans-serif;font-weight:500;display:flex;align-items:center;gap:5px}
.burut:hover{background:var(--dark);color:var(--blush);border-color:var(--dark)}
.marquee{background:linear-gradient(135deg,var(--rose),#B22D3A);min-height:130px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.floaty{position:absolute;font-size:1.3rem;opacity:0.5;animation:float 5s ease-in-out infinite;pointer-events:none}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-14px) rotate(14deg)}}
.marquee-content{display:flex;align-items:center;gap:14px;position:relative;z-index:2;padding:0 20px}
.marquee-bag{font-size:2.6rem;animation:goyang 1.8s ease-in-out infinite;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2))}
@keyframes goyang{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-8px) rotate(6deg)}}
.marquee-text{text-align:left}
.marquee-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#fff;line-height:1.2}
.marquee-sub{font-size:0.8rem;color:rgba(255,255,255,0.88);font-weight:500;margin-top:2px}
.banner-track{display:flex;transition:transform 0.4s ease}
.banner-slide{min-width:100%;aspect-ratio:16/7;display:block}
.banner-slide img{width:100%;height:100%;object-fit:cover;display:block}
.banner-slide a{display:block;width:100%;height:100%}
.banner-dots{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px}
.banner-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);display:inline-block;cursor:pointer}
.banner-dots span.on{background:#fff}
.banner-nav{display:none}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px}
.card{background:white;border-radius:12px;overflow:hidden;border:1px solid var(--border);position:relative}
.cnum{position:absolute;top:7px;left:7px;background:rgba(15,61,62,0.65);color:#FFFFFF;font-size:0.6rem;font-weight:600;padding:2px 7px;border-radius:10px;z-index:1}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;background:var(--blush)}
.noimg{width:100%;aspect-ratio:3/4;background:linear-gradient(135deg,#F2F2F2,#E0E0E0);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.cinfo{padding:9px 11px 7px}
.ckat{font-size:0.58rem;text-transform:uppercase;letter-spacing:2px;color:var(--rose);font-weight:600;margin-bottom:3px}
.cnama{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:0.95rem;margin-bottom:3px;line-height:1.3}
.charga{font-size:0.82rem;font-weight:600}
.cstok{font-size:0.65rem;color:var(--muted);margin-top:2px}
.cstok.h{color:#C0392B}
.cact{display:flex;gap:6px;padding:0 11px 11px}
.bdet{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--ivory);color:var(--dark);font-size:0.72rem;cursor:pointer;font-family:'Inter',sans-serif}
.badd{flex:1;padding:7px;border-radius:8px;border:none;background:var(--rose);color:white;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.badd:disabled{background:#E5E5E5;color:#AFAFAF;cursor:not-allowed}
.loading{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
.spin{width:28px;height:28px;border:2.5px solid var(--blush);border-top-color:var(--rose);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1;font-size:0.9rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,61,62,0.5);z-index:200;align-items:flex-end}
.overlay.show{display:flex}
.modal{background:white;border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;position:relative}
.mtop{padding:12px 20px 0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:10}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto}
.bclose{background:var(--ivory);border:1px solid var(--border);width:30px;height:30px;border-radius:50%;font-size:0.85rem;cursor:pointer}
.mimg{width:100%;background:#181818;display:flex;align-items:center;justify-content:center}
.mimg img{width:100%;max-height:100vw;object-fit:contain;display:block}
.mnoimg{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#F2F2F2,#E0E0E0);display:flex;align-items:center;justify-content:center;font-size:4rem}
.mbody{padding:16px 20px 28px}
.mnum{font-size:0.65rem;color:var(--rose);font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.mkat{font-size:0.62rem;background:var(--blush);color:var(--rose);padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.mnama{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.4rem;margin-bottom:6px;line-height:1.3}
.mharga{font-size:1.2rem;font-weight:700;margin-bottom:8px}
.mstok{display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.72rem;font-weight:600;margin-bottom:14px}
.sa{background:#FDEAEA;color:#C0392B}
.sh{background:#F5DADA;color:#B23A3A}
.mdesk{font-size:0.87rem;color:#6B6B6B;line-height:1.7;margin-bottom:16px}
.mdiv{height:1px;background:var(--border);margin-bottom:16px}
.mact{display:flex;gap:10px}
.bwa{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;background:#25D366;color:white;border:none;border-radius:12px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.bcm{flex:1;padding:13px;background:var(--dark);color:var(--blush);border:none;border-radius:12px;font-size:0.88rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.covl{display:none;position:fixed;inset:0;background:rgba(15,61,62,0.5);z-index:300;align-items:flex-end}
.covl.show{display:flex}
.cpanel{background:white;border-radius:24px 24px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:20px 20px 32px}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.chdr h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.2rem}
.cclose{background:var(--ivory);border:1px solid var(--border);width:30px;height:30px;border-radius:50%;font-size:0.85rem;cursor:pointer}
.cempty{text-align:center;padding:40px 20px;color:var(--muted)}
.citem{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.cimg{width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--blush);flex-shrink:0}
.cnoimg{width:56px;height:56px;border-radius:10px;background:var(--blush);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.ciinfo{flex:1;min-width:0}
.cinum{font-size:0.6rem;color:var(--rose);font-weight:600;letter-spacing:1.5px}
.cinam{font-weight:600;font-size:0.87rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cihrg{font-size:0.78rem;color:var(--rose);font-weight:600;margin-top:2px}
.cqty{display:flex;align-items:center;gap:10px;margin-top:6px}
.bqty{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--ivory);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qnum{font-size:0.88rem;font-weight:600;min-width:20px;text-align:center}
.bdel{background:transparent;border:none;color:#B23A3A;font-size:1rem;cursor:pointer;padding:4px}
.csum{padding:14px 0 4px;border-top:1px solid var(--border);margin-top:4px}
.ctot{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ctot span{font-size:0.87rem;color:var(--muted)}
.ctot strong{font-size:1.1rem;font-weight:700}
.bco{width:100%;padding:14px;background:#181818;color:#FFFFFF;border:none;border-radius:14px;font-size:0.95rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--dark);color:#FFFFFF;padding:10px 22px;border-radius:30px;font-size:0.8rem;z-index:999;opacity:0;transition:opacity 0.3s;white-space:nowrap;border:1px solid #3A1F1F}
.toast.show{opacity:1}
footer{text-align:center;padding:24px;color:var(--muted);font-size:0.72rem;border-top:1px solid var(--border);margin-top:8px;letter-spacing:1px}
</style>
</head>
<body>
<header>
<div style="width:40px"></div>
<div class="htitle"><h1>Jenny's Thrift Shop</h1><p>Curated Fashion</p></div>
<button class="bcart" onclick="bukaCart()">🛒<span class="badge" id="badge">0</span></button>
</header>
<div class="marquee">
  <span class="floaty" style="top:14%;left:8%;animation-delay:0s">🎀</span>
  <span class="floaty" style="top:65%;left:14%;animation-delay:1s">✨</span>
  <span class="floaty" style="top:22%;right:10%;animation-delay:1.6s">💫</span>
  <span class="floaty" style="top:62%;right:16%;animation-delay:0.6s">🛍️</span>
  <div class="marquee-content">
    <span class="marquee-bag">🛒</span>
    <div class="marquee-text">
      <div class="marquee-title">Selamat Berbelanja!</div>
      <div class="marquee-sub">Jangan lupa checkout kakak.. 🛍️</div>
    </div>
  </div>
</div>
<div class="banner" id="banner"></div>
<div class="sbar"><input type="text" id="cari" placeholder="Cari produk..."></div>
<div class="toolbar">
  <div class="selwrap"><select class="selkat" id="fbar" onchange="setKat(this.value)"><option value="semua">Semua Kategori</option></select></div>
  <button class="burut" id="btnUrut" onclick="toggleSort()">🆕 Urutkan: Terbaru</button>
</div>
<div class="grid" id="grid"><div class="loading"><div class="spin"></div><p>Memuat produk...</p></div></div>
<div class="overlay" id="dOvl"><div class="modal"><div class="mtop"><div style="width:30px"></div><div class="mhandle"></div><button class="bclose" onclick="tutupD()">✕</button></div><div id="dIsi"></div></div></div>
<div class="covl" id="cOvl"><div class="cpanel"><div class="chdr"><h2>Keranjang Belanja</h2><button class="cclose" onclick="tutupC()">✕</button></div><div id="cIsi"></div></div></div>
<div class="toast" id="toast"></div>
<footer>© 2024 Jenny's Thrift Shop · Curated Fashion</footer>
<script>
var SB = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
var KEY = 'sb_publishable_VP4uq4EYVSzcuBxDNZJ9Fg_OmmvoRm4';
var BUCKET = 'produk_images';
var WA = '6283857074963';
var produk = [];
var aktif = 'semua';
var sortOrder = 'terbaru';
var cart = [];
try { cart = JSON.parse(localStorage.getItem('jts_cart')||'[]'); } catch(e){ cart=[]; }
function simpanCart(){ try{ localStorage.setItem('jts_cart', JSON.stringify(cart)); }catch(e){} }

function hdrs() { return {'apikey':KEY,'Authorization':'Bearer '+KEY}; }
function iurl(p) { if(!p)return null; if(p.indexOf('http')===0)return p; return SB+'/storage/v1/object/public/'+BUCKET+'/'+p; }
function rp(h) { return 'Rp '+Number(h).toLocaleString('id-ID'); }
function num(n) { return n ? '#'+String(n).padStart(3,'0') : '#---'; }

function getFotos(p) {
  var raw = p.produk_gambar || [];
  if (!Array.isArray(raw)) raw = [raw];
  var fotos = raw.filter(function(f){return f && f.url;}).sort(function(a,b){return (a.urutan||0)-(b.urutan||0);});
  if (fotos.length > 0) return fotos.map(function(f){return f.url;});
  if (p.gambar_url) return [p.gambar_url];
  return [];
}

function load() {
  var url = SB+'/rest/v1/produk';
  url += '?select=*,produk_gambar(id,url,urutan)';
  url += '&order=created_at.desc';
  fetch(url, {headers:hdrs()})
  .then(function(r){
    return r.json().then(function(d){return {status:r.status, ok:r.ok, body:d};});
  })
  .then(function(res){
    if(!res.ok || !Array.isArray(res.body)){
      console.error('Supabase error:', res);
      return loadFallback();
    }
    produk=res.body;
    buatFilter(produk);
    render(sortProduk(produk));
  })
  .catch(function(e){
    console.error('Fetch error:', e);
    document.getElementById('grid').innerHTML='<div class="empty">⚠️ Gagal memuat: '+e.message+'<br><small>Cek console (F12) untuk detail.</small></div>';
  });
}

function loadFallback() {
  var url = SB+'/rest/v1/produk?select=*&order=nomor.desc';
  return fetch(url, {headers:hdrs()})
  .then(function(r){return r.json().then(function(d){return {status:r.status, ok:r.ok, body:d};});})
  .then(function(res){
    if(!res.ok || !Array.isArray(res.body)){
      var pesan = (res.body && res.body.message) ? res.body.message : JSON.stringify(res.body);
      document.getElementById('grid').innerHTML =
        '<div class="empty">⚠️ Error dari Supabase:<br><b>'+pesan+'</b>'+
        '<br><small>Status: '+res.status+'</small>'+
        '<br><small>Periksa: 1) RLS policy tabel produk mengizinkan SELECT untuk anon, 2) nama tabel/kolom benar, 3) relasi produk_gambar ada.</small></div>';
      return;
    }
    produk=res.body;
    buatFilter(produk);
    render(sortProduk(produk));
    showToast('⚠️ Foto tidak termuat (cek relasi produk_gambar)');
  });
}

function buatFilter(d) {
  var kat=[];
  d.forEach(function(p){if(p.kategori&&kat.indexOf(p.kategori)===-1)kat.push(p.kategori);});
  var b=document.getElementById('fbar');
  b.innerHTML='<option value="semua">Semua Kategori</option>';
  kat.forEach(function(k){
    var opt=document.createElement('option');
    opt.value=k; opt.textContent=k;
    b.appendChild(opt);
  });
}

function setKat(k) {
  aktif=k;
  cariFilter();
}

function toggleSort() {
  sortOrder = sortOrder==='terbaru' ? 'terlama' : 'terbaru';
  var btn=document.getElementById('btnUrut');
  btn.innerHTML = sortOrder==='terbaru' ? '🆕 Urutkan: Terbaru' : '⏳ Urutkan: Terlama';
  cariFilter();
}

function getSortKey(p) {
  if (p.created_at) { var t=new Date(p.created_at).getTime(); if(!isNaN(t)) return t; }
  return p.nomor || 0;
}

function sortProduk(arr) {
  var sorted = arr.slice();
  sorted.sort(function(a,b){
    var ka=getSortKey(a), kb=getSortKey(b);
    return sortOrder==='terbaru' ? (kb-ka) : (ka-kb);
  });
  return sorted;
}

function cariFilter() {
  var q=document.getElementById('cari').value.toLowerCase();
  var r=produk;
  if(aktif!=='semua') r=r.filter(function(p){return p.kategori===aktif;});
  if(q) r=r.filter(function(p){return p.nama.toLowerCase().indexOf(q)!==-1||(p.deskripsi||'').toLowerCase().indexOf(q)!==-1;});
  r=sortProduk(r);
  render(r);
}

function render(d) {
  if(!d.length){document.getElementById('grid').innerHTML='<div class="empty">👗 Tidak ada produk</div>';return;}
  var h=d.map(function(p){
    var fotos=getFotos(p);
    var img=fotos.length>0?'<img src="'+iurl(fotos[0])+'" onerror="this.style.display=\'none\'" onclick="location.href=\'produk.html?id=\'+\''+p.id+'\'">':'<div class="noimg" onclick="location.href=\'produk.html?id=\'+\''+p.id+'\'">👗</div>';
    var hbs=p.stok<=0;
    return '<div class="card">'+
      '<div class="cnum">'+num(p.nomor)+'</div>'+img+
      '<div class="cinfo">'+
        (p.kategori?'<div class="ckat">'+p.kategori+'</div>':'')+
        '<div class="cnama">'+p.nama+'</div>'+
        '<div class="charga">'+rp(p.harga)+'</div>'+
        '<div class="cstok'+(hbs?' h':'')+'">'+( hbs?'Habis':'Stok: '+p.stok)+' </div>'+
      '</div>'+
      '<div class="cact">'+
        '<button class="bdet" onclick="location.href=\'produk.html?id=\'+\''+p.id+'\'">Detail</button>'+
        '<button class="badd"'+(hbs?' disabled':'')+' onclick="addCart(\''+p.id+'\')">+ Keranjang</button>'+
      '</div></div>';
  }).join('');
  document.getElementById('grid').innerHTML=h;
}

var sliderIdx=0;
var sliderFotos=[];

function buatSlider(fotos) {
  if(!fotos.length) return '<div class="mnoimg">👗</div>';
  if(fotos.length===1) return '<div class="mimg"><img src="'+iurl(fotos[0])+'"></div>';
  sliderFotos=fotos; sliderIdx=0;
  var slides=fotos.map(function(f){return '<div style="min-width:100%;display:flex;align-items:center;justify-content:center;background:#181818"><img src="'+iurl(f)+'" style="width:100%;max-height:100vw;object-fit:contain;display:block"></div>';}).join('');
  var dots=fotos.map(function(_,i){return '<span onclick="goSlide('+i+')" style="width:7px;height:7px;border-radius:50%;background:'+(i===0?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.3)')+';cursor:pointer;display:inline-block"></span>';}).join('');
  return '<div style="position:relative;width:100%;overflow:hidden;background:#181818">'+
    '<div id="slides" style="display:flex;transition:transform 0.3s ease">'+slides+'</div>'+
    '<button onclick="goSlide(sliderIdx-1)" style="position:absolute;top:50%;left:8px;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;width:30px;height:30px;border-radius:50%;font-size:1.1rem;cursor:pointer">‹</button>'+
    '<button onclick="goSlide(sliderIdx+1)" style="position:absolute;top:50%;right:8px;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:white;border:none;width:30px;height:30px;border-radius:50%;font-size:1.1rem;cursor:pointer">›</button>'+
    '<div id="sdots" style="position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px">'+dots+'</div>'+
    '<div style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);color:white;font-size:0.65rem;padding:2px 8px;border-radius:10px" id="scnt">1/'+fotos.length+'</div>'+
  '</div>';
}

function goSlide(i) {
  if(!sliderFotos.length) return;
  sliderIdx=(i+sliderFotos.length)%sliderFotos.length;
  var slides=document.getElementById('slides');
  if(slides) slides.style.transform='translateX(-'+(sliderIdx*100)+'%)';
  var dots=document.querySelectorAll('#sdots span');
  dots.forEach(function(d,j){d.style.background=j===sliderIdx?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.3)';});
  var cnt=document.getElementById('scnt');
  if(cnt) cnt.textContent=(sliderIdx+1)+'/'+sliderFotos.length;
}

function detail(id) {
  var p=produk.find(function(x){return x.id===id;});
  if(!p)return;
  var fotos=getFotos(p);
  var hbs=p.stok<=0;
  document.getElementById('dIsi').innerHTML=buatSlider(fotos)+
    '<div class="mbody">'+
      '<div class="mnum">'+num(p.nomor)+' · '+fotos.length+' foto</div>'+
      (p.kategori?'<div class="mkat">'+p.kategori+'</div>':'')+
      '<div class="mnama">'+p.nama+'</div>'+
      '<div class="mharga">'+rp(p.harga)+'</div>'+
      '<span class="mstok '+(hbs?'sh':'sa')+'">'+(hbs?'✗ Stok Habis':'✓ Tersedia ('+p.stok+' pcs)')+'</span>'+
      (p.deskripsi?'<div class="mdesk">'+p.deskripsi+'</div>':'')+
      '<div class="mdiv"></div>'+
      '<div class="mact">'+
        (hbs
          ? '<p style="color:#B23A3A;font-size:0.85rem;width:100%;text-align:center">Stok habis</p>'
          : '<button class="bcm" onclick="addCart(\''+p.id+'\');tutupD()">🛒 Keranjang</button>'+
            '<button class="bwa" onclick="pesanWA(\''+p.nama.replace(/'/g,"\\'").replace(/"/g,'&quot;')+'\',\''+num(p.nomor)+'\','+p.harga+')">💬 WhatsApp</button>')+
      '</div></div>';
  document.getElementById('dOvl').classList.add('show');
}

function tutupD(){document.getElementById('dOvl').classList.remove('show');}

function addCart(id) {
  var p=produk.find(function(x){return x.id===id;});
  if(!p||p.stok<=0)return;
  var ada=cart.find(function(x){return x.id===id;});
  if(ada){
    if(ada.qty<p.stok){ada.qty++;showToast('✓ '+p.nama+' +1');}
    else{showToast('Stok maks '+p.stok);return;}
  } else {
    cart.push({id:p.id,num:num(p.nomor),nama:p.nama,harga:p.harga,foto:p.gambar_url,qty:1,stok:p.stok});
    showToast('✓ Ditambahkan ke keranjang');
  }
  simpanCart();
  updBadge();
  pulseCart();
}

function pulseCart(){
  var btn=document.querySelector('.bcart');
  var b=document.getElementById('badge');
  [btn,b].forEach(function(el){
    if(!el) return;
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  });
}

function updBadge(){
  var b=document.getElementById('badge');
  var total=cart.reduce(function(s,i){return s+i.qty;},0);
  if(total>0){
    b.textContent=total>99?'99+':total;
    b.style.display='flex';
  } else {
    b.style.display='none';
  }
}

function bukaCart(){
  renderCart();
  document.getElementById('cOvl').classList.add('show');
}

function tutupC(){
  document.getElementById('cOvl').classList.remove('show');
}

function renderCart(){
  var el=document.getElementById('cIsi');
  if(!cart.length){
    el.innerHTML='<div class="cempty">🛍️ Keranjang masih kosong</div>';
    return;
  }
  var total=0;
  var items=cart.map(function(c){
    total += c.harga*c.qty;
    var img = c.foto ? '<img class="cimg" src="'+iurl(c.foto)+'" onerror="this.outerHTML=\'<div class=&quot;cnoimg&quot;>👗</div>\'">' : '<div class="cnoimg">👗</div>';
    return '<div class="citem">'+
      img+
      '<div class="ciinfo">'+
        '<div class="cinum">'+c.num+'</div>'+
        '<div class="cinam">'+c.nama+'</div>'+
        '<div class="cihrg">'+rp(c.harga)+'</div>'+
        '<div class="cqty">'+
          '<button class="bqty" onclick="ubahQty(\''+c.id+'\',-1)">−</button>'+
          '<span class="qnum">'+c.qty+'</span>'+
          '<button class="bqty" onclick="ubahQty(\''+c.id+'\',1)">+</button>'+
        '</div>'+
      '</div>'+
      '<button class="bdel" onclick="hapusCart(\''+c.id+'\')">🗑️</button>'+
    '</div>';
  }).join('');
  el.innerHTML = items+
    '<div class="csum">'+
      '<div class="ctot"><span>Total</span><strong>'+rp(total)+'</strong></div>'+
      '<button class="bco" onclick="checkout()">💬 Pesan via WhatsApp</button>'+
    '</div>';
}

function ubahQty(id,d){
  var c=cart.find(function(x){return x.id===id;});
  if(!c)return;
  c.qty+=d;
  if(c.qty<=0){
    cart=cart.filter(function(x){return x.id!==id;});
  } else if(c.qty>c.stok){
    c.qty=c.stok;
    showToast('Stok maks '+c.stok);
  }
  simpanCart();
  updBadge();
  renderCart();
}

function hapusCart(id){
  cart=cart.filter(function(x){return x.id!==id;});
  simpanCart();
  updBadge();
  renderCart();
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer=setTimeout(function(){t.classList.remove('show');},2200);
}

function pesanWA(nama,nomor,harga){
  var teks='Halo, saya mau tanya produk '+nomor+' - '+nama+' ('+rp(harga)+')';
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(teks),'_blank');
}

function checkout(){
  if(!cart.length)return;
  var lines=cart.map(function(c){
    return '- '+c.num+' '+c.nama+' x'+c.qty+' = '+rp(c.harga*c.qty);
  });
  var total=cart.reduce(function(s,c){return s+c.harga*c.qty;},0);
  var teks='Halo, saya mau pesan:\n'+lines.join('\n')+'\n\nTotal: '+rp(total);
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(teks),'_blank');
}

document.getElementById('cari').addEventListener('input', cariFilter);
updBadge();
load();
</script>
</body>
</html>

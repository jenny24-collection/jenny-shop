<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jenny's Thrift Shop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#F8F5F0; --dark:#1C1917; --rose:#9D6E6E;
    --blush:#E8D5D5; --ivory:#FAF6F1; --muted:#9A9089;
    --border:#E5DDD6; --white:#FFFFFF;
  }
  body { background:var(--bg); color:var(--dark); font-family:'Inter',sans-serif; min-height:100vh; }

  header { background:var(--dark); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; border-bottom:1px solid #2C2825; }
  .header-left { width:40px; }
  .header-title { text-align:center; flex:1; }
  .header-title h1 { font-family:'Cormorant Garamond',serif; color:#E8D5D5; font-size:1.45rem; font-weight:600; letter-spacing:1.5px; }
  .header-title p { color:#7A6E68; font-size:0.58rem; letter-spacing:4px; text-transform:uppercase; margin-top:1px; }
  .btn-cart { position:relative; background:transparent; border:none; color:#E8D5D5; font-size:1.3rem; cursor:pointer; padding:4px; width:40px; display:flex; justify-content:flex-end; }
  .cart-badge { position:absolute; top:-2px; right:-2px; background:var(--rose); color:white; font-size:0.55rem; font-weight:700; width:15px; height:15px; border-radius:50%; display:none; align-items:center; justify-content:center; }

  .search-bar { padding:14px 16px; background:var(--ivory); border-bottom:1px solid var(--border); }
  .search-bar input { width:100%; padding:10px 18px; border-radius:30px; border:1px solid var(--border); background:var(--white); font-size:0.85rem; font-family:'Inter',sans-serif; outline:none; color:var(--dark); }
  .search-bar input:focus { border-color:var(--rose); }
  .search-bar input::placeholder { color:#C5B8B0; }

  .filter-bar { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; background:var(--ivory); border-bottom:1px solid var(--border); }
  .filter-bar::-webkit-scrollbar { display:none; }
  .filter-btn { white-space:nowrap; padding:5px 16px; border-radius:20px; border:1px solid var(--border); background:transparent; font-size:0.75rem; cursor:pointer; color:var(--muted); font-family:'Inter',sans-serif; transition:all 0.2s; font-weight:500; }
  .filter-btn.active, .filter-btn:hover { background:var(--dark); color:var(--blush); border-color:var(--dark); }

  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; padding:16px; }
  .card { background:var(--white); border-radius:14px; overflow:hidden; box-shadow:0 1px 6px rgba(28,25,23,0.07); position:relative; border:1px solid var(--border); }
  .card-num { position:absolute; top:8px; left:8px; background:rgba(28,25,23,0.65); color:#E8D5D5; font-size:0.6rem; font-weight:600; padding:2px 7px; border-radius:10px; z-index:1; letter-spacing:0.5px; }
  .card img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; background:var(--blush); }
  .card-no-img { width:100%; aspect-ratio:3/4; background:linear-gradient(135deg,#EDE0DC,#DDD0CC); display:flex; align-items:center; justify-content:center; font-size:2.5rem; }
  .card-info { padding:10px 12px 8px; }
  .card-kategori { font-size:0.58rem; text-transform:uppercase; letter-spacing:2px; color:var(--rose); font-weight:600; margin-bottom:4px; }
  .card-nama { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:1rem; color:var(--dark); margin-bottom:4px; line-height:1.3; }
  .card-harga { font-size:0.82rem; font-weight:600; color:var(--dark); }
  .card-stok { font-size:0.65rem; color:var(--muted); margin-top:2px; }
  .card-stok.habis { color:#B85C5C; }
  .card-actions { display:flex; gap:6px; padding:0 12px 12px; }
  .btn-detail { flex:1; padding:7px; border-radius:8px; border:1px solid var(--border); background:var(--ivory); color:var(--dark); font-size:0.72rem; cursor:pointer; font-family:'Inter',sans-serif; font-weight:500; }
  .btn-add-cart { flex:1; padding:7px; border-radius:8px; border:none; background:var(--dark); color:var(--blush); font-size:0.72rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-add-cart:disabled { background:#D9D0CA; color:#B0A8A2; cursor:not-allowed; }

  .loading { text-align:center; padding:60px 20px; color:var(--muted); grid-column:1/-1; }
  .loading-spinner { width:28px; height:28px; border:2.5px solid var(--blush); border-top-color:var(--rose); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty { text-align:center; padding:60px 20px; color:var(--muted); grid-column:1/-1; }

  /* MODAL DETAIL */
  .overlay { display:none; position:fixed; inset:0; background:rgba(28,25,23,0.55); z-index:200; align-items:flex-end; }
  .overlay.show { display:flex; }
  .modal { background:var(--white); border-radius:24px 24px 0 0; width:100%; max-height:92vh; overflow-y:auto; animation:slideUp 0.3s ease; position:relative; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-topbar { padding:14px 20px 0; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--white); z-index:10; }
  .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto; }
  .btn-close { background:var(--ivory); border:1px solid var(--border); width:30px; height:30px; border-radius:50%; font-size:0.85rem; cursor:pointer; flex-shrink:0; }

  /* FOTO SLIDER */
  .foto-slider { position:relative; width:100%; background:#1C1917; overflow:hidden; }
  .foto-slides { display:flex; transition:transform 0.3s ease; }
  .foto-slide { min-width:100%; display:flex; align-items:center; justify-content:center; }
  .foto-slide img { width:100%; max-height:100vw; object-fit:contain; display:block; }
  .foto-dots { position:absolute; bottom:8px; left:0; right:0; display:flex; justify-content:center; gap:5px; }
  .foto-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.4); cursor:pointer; transition:background 0.2s; }
  .foto-dot.active { background:rgba(255,255,255,0.9); }
  .foto-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.35); color:white; border:none; width:32px; height:32px; border-radius:50%; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .foto-nav.prev { left:8px; }
  .foto-nav.next { right:8px; }
  .foto-counter { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.5); color:white; font-size:0.65rem; padding:2px 8px; border-radius:10px; }
  .modal-no-img { width:100%; aspect-ratio:4/3; background:linear-gradient(135deg,#EDE0DC,#DDD0CC); display:flex; align-items:center; justify-content:center; font-size:4rem; }

  .modal-body { padding:18px 20px 28px; }
  .modal-num { font-size:0.65rem; color:var(--rose); font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  .modal-badge { font-size:0.62rem; background:var(--blush); color:var(--rose); padding:3px 10px; border-radius:10px; display:inline-block; margin-bottom:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
  .modal-nama { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:1.45rem; margin-bottom:6px; line-height:1.3; }
  .modal-harga { font-size:1.2rem; font-weight:700; color:var(--dark); margin-bottom:10px; }
  .modal-stok { display:inline-block; padding:4px 12px; border-radius:12px; font-size:0.72rem; font-weight:600; margin-bottom:14px; }
  .stok-ada { background:#EDF7EE; color:#2D7A34; }
  .stok-habis { background:#FDECEA; color:#B85050; }
  .modal-desk { font-size:0.87rem; color:#6B5E58; line-height:1.7; margin-bottom:18px; }
  .modal-divider { height:1px; background:var(--border); margin-bottom:18px; }
  .modal-actions { display:flex; gap:10px; }
  .btn-wa { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:13px; background:#25D366; color:white; border:none; border-radius:12px; font-size:0.88rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }
  .btn-cart-modal { flex:1; padding:13px; background:var(--dark); color:var(--blush); border:none; border-radius:12px; font-size:0.88rem; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; }

  /* KERANJANG */
  .cart-overlay { display:none; position:fixed; inset:0; background:rgba(28,25,23,0.55); z-index:300; align-items:flex-end; }
  .cart-overlay.show { display:flex; }
  .cart-panel { background:var(--white); border-radius:24px 24px 0 0; width:100%; max-height:88vh; overflow-y:auto; padding:20px 20px 32px; animation:slideUp 0.3s ease; }
  .cart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .cart-header h2 { font-family:'Cormorant Garamond',serif; font-weight:600; font-size:1.2rem; color:var(--dark); }
  .cart-close { background:var(--ivory); border:1px solid var(--border); width:30px; height:30px; border-radius:50%; font-size:0.85rem; cursor:pointer; }
  .cart-empty { text-align:center; padding:40px 20px; color:var(--muted); }
  .cart-item { display:flex; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
  .cart-item-img { width:58px; height:58px; border-radius:10px; object-fit:cover; background:var(--blush); flex-shrink:0; }
  .cart-item-noimg { width:58px; height:58px; border-radius:10px; background:var(--blush); display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
  .cart-item-info { flex:1; min-width:0; }
  .cart-item-num { font-size:0.6rem; color:var(--rose); font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
  .cart-item-nama { font-weight:600; font-size:0.87rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .cart-item-harga { font-size:0.78rem; color:var(--rose); font-weight:600; margin-top:2px; }
  .cart-qty { display:flex; align-items:center; gap:10px; margin-top:7px; }
  .btn-qty { width:26px; height:26px; border-radius:50%; border:1px solid var(--border); background:var(--ivory); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--dark); }
  .qty-num { font-size:0.88rem; font-weight:600; min-width:20px; text-align:center; }
  .btn-hapus-item { background:transparent; border:none; color:#C07070; font-size:1rem; cursor:pointer; padding:4px; }
  .cart-summary { padding:16px 0 6px; border-top:1px solid var(--border); margin-top:6px; }
  .cart-total { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .cart-total span { font-size:0.87rem; color:var(--muted); }
  .cart-total strong { font-size:1.1rem; font-weight:700; }
  .btn-checkout { width:100%; padding:14px; background:#1C1917; color:#E8D5D5; border:none; border-radius:14px; font-size:0.95rem; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:'Inter',sans-serif; }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--dark); color:#E8D5D5; padding:10px 22px; border-radius:30px; font-size:0.8rem; z-index:999; opacity:0; transition:opacity 0.3s; white-space:nowrap; border:1px solid #3C3530; }
  .toast.show { opacity:1; }
  footer { text-align:center; padding:28px; color:var(--muted); font-size:0.72rem; border-top:1px solid var(--border); margin-top:8px; letter-spacing:1px; }
</style>
</head>
<body>

<header>
  <div class="header-left"></div>
  <div class="header-title">
    <h1>Jenny's Thrift Shop</h1>
    <p>Curated Fashion</p>
  </div>
  <button class="btn-cart" onclick="bukaKeranjang()">
    🛒<span class="cart-badge" id="cartBadge">0</span>
  </button>
</header>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Cari produk...">
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterKategori('semua',this)">Semua</button>
</div>

<div class="grid" id="produkGrid">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p style="font-size:0.85rem">Memuat produk...</p>
  </div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-topbar">
      <div style="width:30px"></div>
      <div class="modal-handle"></div>
      <button class="btn-close" onclick="tutupDetail()">✕</button>
    </div>
    <div id="detailIsi"></div>
  </div>
</div>

<div class="cart-overlay" id="cartOverlay">
  <div class="cart-panel">
    <div class="cart-header">
      <h2>Keranjang Belanja</h2>
      <button class="cart-close" onclick="tutupKeranjang()">✕</button>
    </div>
    <div id="cartIsi"></div>
  </div>
</div>

<div class="toast" id="toastEl"></div>
<footer>© 2024 Jenny's Thrift Shop · Curated Fashion</footer>

<script>
const SUPABASE_URL = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYmtkaG11dGllcml5anFzaWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjA0MzIsImV4cCI6MjA5NzQ5NjQzMn0.EEBWrk2kI98owsQNlOOPGBmLzXHQGoUBJqsOyl7lTrc';
const BUCKET = 'produk_images';
const WA_NUMBER = '6283857074963';

var semuaProduk = [];
var kategoriAktif = 'semua';
var keranjang = [];

function fetchProduk() {
  fetch(SUPABASE_URL + '/rest/v1/produk?select=*,produk_gambar(id,url,urutan)&order=nomor.asc', {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!Array.isArray(data)) { showGrid('<div class="empty"><p>⚠️ ' + (data.message||'Error') + '</p></div>'); return; }
    semuaProduk = data;
    renderKategori(data);
    renderProduk(data);
  })
  .catch(function() { showGrid('<div class="empty"><p>⚠️ Gagal memuat produk</p></div>'); });
}

function showGrid(html) { document.getElementById('produkGrid').innerHTML = html; }

function imgUrl(path) {
  if (!path) return null;
  if (path.indexOf('http') === 0) return path;
  return SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + path;
}

function fmtHarga(h) { return 'Rp ' + Number(h).toLocaleString('id-ID'); }

function getFotos(p) {
  var fotos = (p.produk_gambar || []).sort(function(a,b){return a.urutan-b.urutan;});
  if (fotos.length > 0) return fotos.map(function(f){return f.url;});
  if (p.gambar_url) return [p.gambar_url];
  return [];
}

function renderKategori(data) {
  var kat = [];
  data.forEach(function(p) { if (p.kategori && kat.indexOf(p.kategori)===-1) kat.push(p.kategori); });
  var bar = document.getElementById('filterBar');
  bar.innerHTML = '<button class="filter-btn active" onclick="filterKategori(\'semua\',this)">Semua</button>';
  kat.forEach(function(k) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.textContent = k;
    btn.onclick = function() { filterKategori(k,this); };
    bar.appendChild(btn);
  });
}

function filterKategori(kat, el) {
  kategoriAktif = kat;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active'); cariDanFilter();
}

function cariDanFilter() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var hasil = semuaProduk;
  if (kategoriAktif !== 'semua') hasil = hasil.filter(function(p){return p.kategori===kategoriAktif;});
  if (q) hasil = hasil.filter(function(p){return p.nama.toLowerCase().indexOf(q)!==-1||(p.deskripsi||'').toLowerCase().indexOf(q)!==-1;});
  renderProduk(hasil);
}

function renderProduk(data) {
  if (!data.length) { showGrid('<div class="empty"><p>👗 Tidak ada produk</p></div>'); return; }
  var html = data.map(function(p) {
    var fotos = getFotos(p);
    var habis = p.stok <= 0;
    var img = fotos.length > 0
      ? '<img src="' + imgUrl(fotos[0]) + '" alt="' + p.nama + '" onerror="this.style.display=\'none\'">'
      : '<div class="card-no-img">👗</div>';
    var num = '#' + String(p.nomor).padStart(3,'0');
    return '<div class="card">' +
      '<div class="card-num">' + num + '</div>' + img +
      '<div class="card-info">' +
        (p.kategori?'<div class="card-kategori">'+p.kategori+'</div>':'') +
        '<div class="card-nama">' + p.nama + '</div>' +
        '<div class="card-harga">' + fmtHarga(p.harga) + '</div>' +
        '<div class="card-stok' + (habis?' habis':'') + '">' + (habis?'Stok Habis':'Stok: '+p.stok+' pcs') + '</div>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="btn-detail" onclick="bukaDetail(\'' + p.id + '\')">Detail</button>' +
        '<button class="btn-add-cart"' + (habis?' disabled':'') + ' onclick="tambahKeranjang(\'' + p.id + '\')">+ Keranjang</button>' +
      '</div></div>';
  }).join('');
  showGrid(html);
}

// SLIDER
var sliderIdx = 0;
var sliderFotos = [];

function buatSlider(fotos) {
  if (fotos.length === 0) return '<div class="modal-no-img">👗</div>';
  if (fotos.length === 1) {
    return '<div class="foto-slider"><div class="foto-slides"><div class="foto-slide"><img src="' + imgUrl(fotos[0]) + '"></div></div></div>';
  }
  sliderFotos = fotos; sliderIdx = 0;
  var slides = fotos.map(function(f) {
    return '<div class="foto-slide"><img src="' + imgUrl(f) + '"></div>';
  }).join('');
  var dots = fotos.map(function(_,i) {
    return '<div class="foto-dot' + (i===0?' active':'') + '" onclick="gotoSlide(' + i + ')"></div>';
  }).join('');
  return '<div class="foto-slider" id="fotoSlider">' +
    '<div class="foto-slides" id="fotoSlides">' + slides + '</div>' +
    '<button class="foto-nav prev" onclick="slideNav(-1)">‹</button>' +
    '<button class="foto-nav next" onclick="slideNav(1)">›</button>' +
    '<div class="foto-dots" id="fotoDots">' + dots + '</div>' +
    '<div class="foto-counter" id="fotoCounter">1 / ' + fotos.length + '</div>' +
  '</div>';
}

function gotoSlide(i) {
  sliderIdx = i;
  var slides = document.getElementById('fotoSlides');
  if (slides) slides.style.transform = 'translateX(-' + (i*100) + '%)';
  var dots = document.querySelectorAll('.foto-dot');
  dots.forEach(function(d,j){d.classList.toggle('active',j===i);});
  var counter = document.getElementById('fotoCounter');
  if (counter) counter.textContent = (i+1) + ' / ' + sliderFotos.length;
}

function slideNav(dir) {
  var n = (sliderIdx + dir + sliderFotos.length) % sliderFotos.length;
  gotoSlide(n);
}

function bukaDetail(id) {
  var p = semuaProduk.find(function(x){return x.id===id;});
  if (!p) return;
  var fotos = getFotos(p);
  var habis = p.stok <= 0;
  var num = '#' + String(p.nomor).padStart(3,'0');
  document.getElementById('detailIsi').innerHTML =
    buatSlider(fotos) +
    '<div class="modal-body">' +
      '<div class="modal-num">' + num + ' · ' + fotos.length + ' foto</div>' +
      (p.kategori?'<div class="modal-badge">'+p.kategori+'</div>':'') +
      '<div class="modal-nama">' + p.nama + '</div>' +
      '<div class="modal-harga">' + fmtHarga(p.harga) + '</div>' +
      '<span class="modal-stok ' + (habis?'stok-habis':'stok-ada') + '">' + (habis?'✗ Stok Habis':'✓ Tersedia ('+p.stok+' pcs)') + '</span>' +
      (p.deskripsi?'<div class="modal-desk">'+p.deskripsi+'</div>':'') +
      '<div class="modal-divider"></div>' +
      '<div class="modal-actions">' +
        (habis
          ? '<p style="color:#B85C5C;font-size:0.85rem;text-align:center;width:100%">Produk ini sedang habis</p>'
          : '<button class="btn-cart-modal" onclick="tambahKeranjang(\'' + p.id + '\');tutupDetail()">🛒 Keranjang</button>' +
            '<button class="btn-wa" onclick="pesanWA(\'' + p.nama.replace(/'/g,"\\'") + '\',\'' + num + '\',' + p.harga + ')">💬 WhatsApp</button>') +
      '</div></div>';
  document.getElementById('detailOverlay').classList.add('show');
}

function tutupDetail() { document.getElementById('detailOverlay').classList.remove('show'); }

function tambahKeranjang(id) {
  var p = semuaProduk.find(function(x){return x.id===id;});
  if (!p || p.stok<=0) return;
  var num = '#' + String(p.nomor).padStart(3,'0');
  var fotos = getFotos(p);
  var ada = keranjang.find(function(x){return x.id===id;});
  if (ada) {
    if (ada.qty < p.stok) { ada.qty++; toast('✓ ' + p.nama + ' +1'); }
    else { toast('Stok maksimal ' + p.stok); return; }
  } else {
    keranjang.push({ id:p.id, num:num, nama:p.nama, harga:p.harga, foto:fotos[0]||null, qty:1, stok:p.stok });
    toast('✓ Ditambahkan ke keranjang');
  }
  updateBadge();
}

function updateBadge() {
  var total = keranjang.reduce(function(s,x){return s+x.qty;},0);
  var badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function bukaKeranjang() { renderKeranjang(); document.getElementById('cartOverlay').classList.add('show'); }
function tutupKeranjang() { document.getElementById('cartOverlay').classList.remove('show'); }

function renderKeranjang() {
  var el = document.getElementById('cartIsi');
  if (!keranjang.length) {
    el.innerHTML = '<div class="cart-empty"><div style="font-size:2.5rem">🛒</div><p style="margin-top:10px;font-size:0.9rem">Keranjang masih kosong</p></div>';
    return;
  }
  var total = keranjang.reduce(function(s,x){return s+x.harga*x.qty;},0);
  var totalQty = keranjang.reduce(function(s,x){return s+x.qty;},0);
  var items = keranjang.map(function(item,i) {
    var img = item.foto
      ? '<img class="cart-item-img" src="' + imgUrl(item.foto) + '" onerror="this.style.display=\'none\'">'
      : '<div class="cart-item-noimg">👗</div>';
    return '<div class="cart-item">' + img +
      '<div class="cart-item-info">' +
        '<div class="cart-item-num">' + item.num + '</div>' +
        '<div class="cart-item-nama">' + item.nama + '</div>' +
        '<div class="cart-item-harga">' + fmtHarga(item.harga) + '</div>' +
        '<div class="cart-qty">' +
          '<button class="btn-qty" onclick="ubahQty(' + i + ',-1)">−</button>' +
          '<span class="qty-num">' + item.qty + '</span>' +
          '<button class="btn-qty" onclick="ubahQty(' + i + ',1)">+</button>' +
        '</div>' +
      '</div>' +
      '<button class="btn-hapus-item" onclick="hapusItem(' + i + ')">🗑</button>' +
    '</div>';
  }).join('');
  el.innerHTML = items +
    '<div class="cart-summary">' +
      '<div class="cart-total"><span>' + totalQty + ' item dipilih</span><strong>' + fmtHarga(total) + '</strong></div>' +
      '<button class="btn-checkout" onclick="checkout()">💬 &nbsp;Checkout via WhatsApp</button>' +
    '</div>';
}

function ubahQty(i, delta) {
  keranjang[i].qty += delta;
  if (keranjang[i].qty <= 0) keranjang.splice(i,1);
  else if (keranjang[i].qty > keranjang[i].stok) { keranjang[i].qty = keranjang[i].stok; toast('Stok maks: ' + keranjang[i].stok); }
  updateBadge(); renderKeranjang();
}

function hapusItem(i) { keranjang.splice(i,1); updateBadge(); renderKeranjang(); }

function checkout() {
  if (!keranjang.length) return;
  var pesan = '🛍 *Jenny\'s Thrift Shop*\n━━━━━━━━━━━━━━━\n';
  keranjang.forEach(function(item,i) {
    pesan += (i+1) + '. ' + item.num + ' ' + item.nama + '\n';
    pesan += '   ' + item.qty + ' pcs × ' + fmtHarga(item.harga) + ' = ' + fmtHarga(item.harga*item.qty) + '\n';
  });
  var total = keranjang.reduce(function(s,x){return s+x.harga*x.qty;},0);
  pesan += '━━━━━━━━━━━━━━━\n*Total: ' + fmtHarga(total) + '*\n\nMohon konfirmasi ketersediaan. Terima kasih! 🙏';
  window.location.href = 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(pesan), '_blank');
}

function pesanWA(nama, num, harga) {
  var pesan = 'Halo kak, saya tertarik dengan:\n\n' + num + ' *' + nama + '*\nHarga: ' + fmtHarga(harga) + '\n\nApakah masih tersedia? 🙏';
  window.location.href = 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(pesan), '_blank');
}

function toast(msg) {
  var t = document.getElementById('toastEl');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2500);
}

document.getElementById('searchInput').addEventListener('input', cariDanFilter);
fetchProduk();
</script>
</body>
</html>

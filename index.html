<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenny Collection | Katalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-pink-600">Jenny Collection</h1>
            <input type="text" id="searchInput" placeholder="Cari produk..." class="bg-slate-100 border-none rounded-lg px-4 py-2 w-64 focus:ring-2 focus:ring-pink-500 outline-none">
        </div>
    </nav>

    <header class="bg-white border-b py-12 px-6 text-center">
        <h2 class="text-4xl font-bold text-slate-900">Katalog Produk</h2>
        <p class="text-slate-500 mt-2">Pilihan koleksi terbaru kami.</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <p class="col-span-full text-center text-slate-400">Memuat data...</p>
        </div>
    </main>

    <footer class="bg-white border-t py-8 text-center text-slate-400 text-sm">
        <p>&copy; 2026 Jenny Collection. Semua hak dilindungi.</p>
    </footer>

    <script>
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');

        async function fetchProduk(search = '') {
            let query = supabase.from('produk').select('*');
            if (search) query = query.ilike('nama', `%${search}%`);
            
            const { data } = await query;
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            if (!data || data.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-500">Produk tidak ditemukan.</p>';
                return;
            }
            
            data.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition">
                        <img src="${p.gambar_url}" class="w-full h-56 object-cover">
                        <div class="p-4">
                            <h3 class="font-semibold text-slate-800">${p.nama}</h3>
                            <p class="text-pink-600 font-bold mt-1">Rp ${p.harga.toLocaleString()}</p>
                            <button class="mt-4 w-full border border-slate-900 hover:bg-slate-900 hover:text-white py-2 rounded-lg text-sm font-medium transition">
                                Beli Sekarang
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => fetchProduk(e.target.value));
        fetchProduk();
    </script>
</body>

</html>

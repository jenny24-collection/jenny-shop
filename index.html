<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenny Collection | Katalog</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #d63384; --nav-bg: #1a237e; --light: #f7f7f7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--light); }

        nav { background: var(--nav-bg); padding: 15px 5%; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 24px; color: white; margin-right: 40px; }
        .search-box { flex: 1; max-width: 600px; padding: 10px 15px; border: none; border-radius: 8px; }

        .main-wrapper { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .product-card h3 { margin: 10px 0; font-size: 16px; }
        .price { color: var(--primary); font-weight: bold; }
        .empty-state { text-align: center; padding: 50px; color: #888; font-style: italic; }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 10px; }
            .search-box { width: 100%; }
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Jenny Collection</div>
        <input type="text" class="search-box" placeholder="Cari koleksi...">
    </nav>

    <div class="main-wrapper">
        <h2>Produk Terbaru</h2>
        <div class="grid" id="product-grid">
            <p class="empty-state">Memuat data...</p>
        </div>
    </div>

    <script>
        // Konfigurasi Supabase yang sudah diperbarui
        const SUPABASE_URL = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYmtkaG11dGllcml5anFzaWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjA0MzIsImV4cCI6MjA5NzQ5NjQzMn0.EEBWrk2kI98owsQNlOOPGBmLzXHQGoUBJqsOyl7lTrc';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProduk() {
            const grid = document.getElementById('product-grid');
            
            // Mengambil data dari tabel 'produk'
            const { data, error } = await supabase.from('produk').select('*');

            if (error) {
                grid.innerHTML = `<p class="empty-state">Error: ${error.message}</p>`;
                console.error("Supabase Error:", error);
                return;
            }

            if (data && data.length > 0) {
                grid.innerHTML = '';
                data.forEach(item => {
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${item.gambar_url || 'https://via.placeholder.com/200'}" alt="${item.nama}">
                            <h3>${item.nama}</h3>
                            <p class="price">Rp ${item.harga ? item.harga.toLocaleString() : '0'}</p>
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = '<p class="empty-state">Belum ada produk tersedia.</p>';
            }
        }

        loadProduk();
    </script>
</body>
</html>

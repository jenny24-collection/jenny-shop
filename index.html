<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenny's Collection | Katalog Eksklusif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .product-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-pink-600">Jenny's Collection</h1>
            <span class="text-xs bg-pink-100 text-pink-600 px-2 py-1 rounded-full">Toko Online</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-md mx-auto p-4">
        <header class="mb-6">
            <h2 class="text-2xl font-semibold">Produk Terbaru</h2>
            <p class="text-gray-500 text-sm">Temukan koleksi pilihan kami hari ini.</p>
        </header>

        <div id="produk-list" class="grid gap-4">
            <p class="text-center py-10 text-gray-400">Sedang memuat koleksi...</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center p-6 mt-10 text-sm text-gray-400">
        &copy; 2026 Jenny's Collection
    </footer>

    <script>
        const SUPABASE_URL = 'https://fkbkdhmutieriyjqsiaz.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrYmtkaG11dGllcml5anFzaWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjA0MzIsImV4cCI6MjA5NzQ5NjQzMn0.EEBWrk2kI98owsQNlOOPGBmLzXHQGoUBJqsOyl7lTrc';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchProduk() {
            const container = document.getElementById('produk-list');
            const { data, error } = await supabase.from('produk').select('*');

            if (error) {
                container.innerHTML = `<p class="text-red-500 text-center">Gagal memuat data.</p>`;
                return;
            }

            if (data.length === 0) {
                container.innerHTML = `<p class="text-center py-10">Belum ada produk tersedia.</p>`;
                return;
            }

            container.innerHTML = data.map(p => `
                <div class="product-card bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-lg font-bold text-gray-900">${p.nama}</h3>
                    <p class="text-pink-600 font-bold text-lg my-1">Rp ${parseInt(p.harga).toLocaleString('id-ID')}</p>
                    <p class="text-sm text-gray-600">${p.deskripsi || 'Tanpa deskripsi'}</p>
                    <div class="mt-4 flex justify-between items-center text-xs font-medium uppercase tracking-wider text-gray-400">
                        <span class="bg-gray-100 px-2 py-1 rounded">${p.kategori}</span>
                        <span>Stok: ${p.stok}</span>
                    </div>
                </div>
            `).join('');
        }

        fetchProduk();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenny Collection | Katalog</title>
    <style>
        :root { --primary: #d63384; --nav-bg: #1a237e; --light: #f7f7f7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--light); }

        /* Navbar */
        nav { 
            background: var(--nav-bg); 
            padding: 15px 5%; 
            display: flex; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo { font-weight: 800; font-size: 24px; color: white; margin-right: 40px; }
        .search-box { flex: 1; max-width: 600px; padding: 10px 15px; border: none; border-radius: 8px; }

        /* Filter Horisontal */
        .filter-bar { background: white; padding: 20px 5%; display: flex; gap: 30px; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 15px; align-items: center; }
        .filter-label { font-weight: 600; color: #555; }

        /* Grid Produk */
        .main-wrapper { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* Placeholder */
        .empty-state { text-align: center; padding: 50px; color: #888; font-style: italic; }

        /* --- MEDIA QUERIES (Responsivitas Mobile) --- */
        
        /* Untuk Tablet/HP Besar */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 10px; }
            .search-box { width: 100%; }
            .filter-bar { flex-direction: column; gap: 15px; align-items: flex-start; }
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Untuk HP Portrait */
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .filter-group { flex-direction: column; align-items: flex-start; gap: 5px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Jenny Collection</div>
        <input type="text" class="search-box" placeholder="Cari koleksi di Jenny Collection...">
    </nav>

    <div class="filter-bar">
        <div class="filter-group">
            <span class="filter-label">Harga:</span>
            <label><input type="checkbox"> < 100rb</label>
            <label><input type="checkbox"> 100rb-300rb</label>
            <label><input type="checkbox"> > 300rb</label>
        </div>
        <div class="filter-group">
            <span class="filter-label">Kategori:</span>
            <label><input type="checkbox"> Dress</label>
            <label><input type="checkbox"> Atasan</label>
            <label><input type="checkbox"> Bawahan</label>
        </div>
    </div>

    <div class="main-wrapper">
        <h2>Produk Terbaru</h2>
        <div class="grid" id="product-grid">
            <p class="empty-state">Belum ada produk yang tersedia saat ini.</p>
        </div>
    </div>
</body>
</html>

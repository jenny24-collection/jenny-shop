<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Jenny Collection | Katalog</title>
    <style>
        :root { --primary: #d63384; --nav-bg: #1a237e; --light: #f7f7f7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--light); }

        /* Navbar dengan warna tegas (Navy) */
        nav { 
            background: var(--nav-bg); 
            padding: 15px 5%; 
            display: flex; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo { font-weight: 800; font-size: 24px; color: white; margin-right: 40px; }
        .search-box { flex: 1; max-width: 600px; padding: 10px 15px; border: none; border-radius: 8px; }

        /* Filter Horisontal (Tetap bersih) */
        .filter-bar { background: white; padding: 20px 5%; display: flex; gap: 30px; border-bottom: 1px solid #eee; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 15px; align-items: center; }
        .filter-label { font-weight: 600; color: #555; }

        /* Grid Produk */
        .main-wrapper { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #eee; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .img-prod { width: 100%; height: 200px; background: #eee; border-radius: 8px; margin-bottom: 10px; }
        .title { font-weight: 600; font-size: 14px; margin: 10px 0 5px 0; }
        .price { color: var(--primary); font-weight: bold; font-size: 14px; }
        .btn-buy { width: 100%; background: white; color: var(--primary); border: 1px solid var(--primary); padding: 8px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .btn-buy:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Jenny Collection</div>
        <input type="text" class="search-box" placeholder="Cari koleksi di Jenny Collection...">
    </nav>

    <div class="filter-bar">
        <!-- Filter tetap sama -->
        <div class="filter-group">
            <span class="filter-label">Harga:</span>
            <label><input type="checkbox"> < 100rb</label>
            <label><input type="checkbox"> 100rb-300rb</label>
            <label><input type="checkbox"> > 300rb</label>
        </div>
        <div class="filter-group">
            <span class="filter-label">Kategori:</span>
            <label><input type="checkbox"> Dress</label>
            <label><input type="checkbox"> Atasan</label>
            <label><input type="checkbox"> Bawahan</label>
        </div>
    </div>

    <div class="main-wrapper">
        <h2>Produk Terbaru</h2>
        <div class="grid">
            <div class="card" onclick="window.location.href='product.html';">
                <div class="img-prod"></div>
                <div class="title">Summer Dress Floral</div>
                <div class="price">Rp 150.000</div>
                <button class="btn-buy" onclick="event.stopPropagation()">Keranjang</button>
            </div>
            <div class="card" onclick="window.location.href='product.html';">
                <div class="img-prod"></div>
                <div class="title">Korean Oversize Tee</div>
                <div class="price">Rp 95.000</div>
                <button class="btn-buy" onclick="event.stopPropagation()">Keranjang</button>
            </div>
        </div>
    </div>
</body>
</html>
